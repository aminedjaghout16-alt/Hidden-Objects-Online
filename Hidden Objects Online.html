<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prop Hunt Protocol - Lobby</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; background-color: #0a0a0f; }
    @keyframes loading {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(200%); }
      100% { transform: translateX(-100%); }
    }
    .animate-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function PropHuntLobby() {
      const [activeTab, setActiveTab] = useState('play');
      const [isSearching, setIsSearching] = useState(false);
      const [roomCode, setRoomCode] = useState('');

      const player = {
        name: 'Operative_77',
        level: 14,
        xp: 2450,
        xpToNext: 3000,
        wins: 42,
        losses: 18,
        favoriteProp: 'Office Chair',
      };

      const xpPercentage = (player.xp / player.xpToNext) * 100;

      useEffect(() => {
        let timer;
        if (isSearching) {
          timer = setTimeout(() => setIsSearching(false), 5000);
        }
        return () => clearTimeout(timer);
      }, [isSearching]);

      return (
        <div className="relative min-h-screen w-full bg-[#0a0a0f] text-[#e2e8f0] overflow-hidden font-sans selection:bg-amber-500/30">
          <div className="pointer-events-none absolute inset-0 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_4px,3px_100%] z-0" />
          <div className="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,#0a0a0f_90%)] z-0" />
          <div className="pointer-events-none absolute inset-0 opacity-[0.03]" style={{ backgroundImage: 'linear-gradient(#f59e0b 1px, transparent 1px), linear-gradient(90deg, #f59e0b 1px, transparent 1px)', backgroundSize: '40px 40px' }} />

          <div className="relative z-10 flex flex-col md:flex-row h-screen max-h-screen">
            <aside className="w-full md:w-80 flex-shrink-0 border-r border-white/10 bg-black/40 backdrop-blur-md flex flex-col">
              <div className="p-6 border-b border-white/10">
                <div className="flex items-center gap-4 mb-4">
                  <div className="relative">
                    <div className="w-16 h-16 rounded-sm bg-gradient-to-br from-amber-500 to-amber-700 flex items-center justify-center font-['Chakra_Petch'] font-bold text-2xl text-black shadow-[0_0_15px_rgba(245,158,11,0.4)]">
                      {player.level}
                    </div>
                    <div className="absolute -bottom-1 -right-1 w-5 h-5 bg-cyan-500 rounded-sm flex items-center justify-center">
                      <svg className="w-3 h-3 text-black" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                    </div>
                  </div>
                  <div>
                    <h2 className="font-['Chakra_Petch'] font-bold text-xl tracking-wider text-white">{player.name}</h2>
                    <p className="font-['JetBrains_Mono'] text-xs text-amber-500 uppercase tracking-widest">Clearance: Alpha</p>
                  </div>
                </div>
                
                <div className="space-y-1">
                  <div className="flex justify-between font-['JetBrains_Mono'] text-xs text-gray-400">
                    <span>XP</span>
                    <span>{player.xp} / {player.xpToNext}</span>
                  </div>
                  <div className="h-2 bg-white/5 rounded-sm overflow-hidden border border-white/10">
                    <div 
                      className="h-full bg-gradient-to-r from-amber-600 to-amber-400 transition-all duration-1000 ease-out shadow-[0_0_10px_rgba(245,158,11,0.5)]"
                      style={{ width: `${xpPercentage}%` }}
                    />
                  </div>
                </div>
              </div>

              <nav className="flex-1 p-4 space-y-2">
                <NavButton active={activeTab === 'play'} onClick={() => setActiveTab('play')} icon={<svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="square" strokeLinejoin="miter" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path strokeLinecap="square" strokeLinejoin="miter" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>}>
                  DEPLOY (Matchmaking)
                </NavButton>
                <NavButton active={activeTab === 'custom'} onClick={() => setActiveTab('custom')} icon={<svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="square" strokeLinejoin="miter" strokeWidth={2} d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>}>
                  PRIVATE OPERATION
                </NavButton>
                <NavButton active={activeTab === 'profile'} onClick={() => setActiveTab('profile')} icon={<svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="square" strokeLinejoin="miter" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>}>
                  DOSSIER (Stats)
                </NavButton>
              </nav>

              <div className="p-4 border-t border-white/10 font-['JetBrains_Mono'] text-xs text-gray-500 flex items-center gap-2">
                <span className="relative flex h-2 w-2">
                  <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                  <span className="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span>
                </span>
                SERVER: US-EAST-1 | 24ms
              </div>
            </aside>

            <main className="flex-1 overflow-y-auto p-6 md:p-12 relative">
              {activeTab === 'play' && (
                <div className="max-w-3xl mx-auto space-y-8 animate-in">
                  <div className="text-center space-y-2">
                    <h1 className="font-['Chakra_Petch'] text-5xl md:text-7xl font-bold text-white tracking-tighter uppercase">
                      Prop Hunt <span className="text-amber-500">Protocol</span>
                    </h1>
                    <p className="font-['JetBrains_Mono'] text-gray-400 text-sm md:text-base max-w-lg mx-auto">
                      Select your operational parameters. Hiders must survive until extraction. Hunters must eliminate all anomalies.
                    </p>
                  </div>

                  <div className="grid md:grid-cols-2 gap-6 mt-12">
                    <button 
                      onClick={() => setIsSearching(true)}
                      disabled={isSearching}
                      className="group relative h-64 bg-white/5 border border-white/10 hover:border-amber-500/50 transition-all duration-300 overflow-hidden text-left p-6 flex flex-col justify-between disabled:opacity-70 disabled:cursor-not-allowed"
                    >
                      <div className="absolute inset-0 bg-gradient-to-br from-amber-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500" />
                      <div className="relative z-10">
                        <div className="w-12 h-12 rounded-sm bg-amber-500/20 flex items-center justify-center mb-4 text-amber-500 group-hover:scale-110 transition-transform duration-300">
                          <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="square" strokeLinejoin="miter" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                        </div>
                        <h3 className="font-['Chakra_Petch'] text-2xl font-bold text-white mb-1">RAPID DEPLOYMENT</h3>
                        <p className="font-['JetBrains_Mono'] text-xs text-gray-400">Public Matchmaking • 8-12 Players • Map: Office Complex</p>
                      </div>
                      <div className="relative z-10 font-['JetBrains_Mono'] text-xs text-amber-500 flex items-center gap-2 group-hover:gap-4 transition-all">
                        INITIATE SEQUENCE <span className="text-lg">→</span>
                      </div>
                    </button>

                    <div className="h-64 bg-black/40 border border-white/10 p-6 flex flex-col justify-between">
                      <div>
                        <h3 className="font-['Chakra_Petch'] text-xl font-bold text-white mb-4 flex items-center gap-2">
                          <span className="w-2 h-2 bg-cyan-500 rounded-sm"></span>
                          OPERATIONAL METRICS
                        </h3>
                        <div className="grid grid-cols-2 gap-4">
                          <StatBox label="WIN RATE" value={`${Math.round((player.wins / (player.wins + player.losses)) * 100)}%`} color="text-cyan-400" />
                          <StatBox label="TOTAL MATCHES" value={player.wins + player.losses} color="text-white" />
                          <StatBox label="FAVORITE DISGUISE" value={player.favoriteProp} color="text-amber-400" />
                          <StatBox label="CURRENT STREAK" value="3 W" color="text-green-400" />
                        </div>
                      </div>
                      <div className="font-['JetBrains_Mono'] text-xs text-gray-500 border-t border-white/10 pt-4">
                        LAST LOGIN: {new Date().toLocaleDateString()} • SESSION ID: #8842A
                      </div>
                    </div>
                  </div>

                  {isSearching && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
                      <div className="bg-[#0f0f16] border border-amber-500/30 p-8 max-w-md w-full mx-4 shadow-[0_0_50px_rgba(245,158,11,0.15)] relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-amber-500/20">
                          <div className="h-full bg-amber-500 animate-[loading_2s_ease-in-out_infinite]" style={{ width: '30%' }}></div>
                        </div>
                        <h3 className="font-['Chakra_Petch'] text-2xl font-bold text-white mb-2 animate-pulse">SCANNING FOR ANOMALIES...</h3>
                        <p className="font-['JetBrains_Mono'] text-sm text-gray-400 mb-6">Establishing secure connection to nearest game server node.</p>
                        <div className="space-y-2 font-['JetBrains_Mono'] text-xs text-gray-500">
                          <div className="flex justify-between"><span>REGION:</span> <span className="text-cyan-400">US-EAST</span></div>
                          <div className="flex justify-between"><span>PLAYERS IN QUEUE:</span> <span className="text-amber-400">142</span></div>
                          <div className="flex justify-between"><span>ESTIMATED WAIT:</span> <span className="text-white">&lt; 15s</span></div>
                        </div>
                        <button 
                          onClick={() => setIsSearching(false)}
                          className="mt-6 w-full py-3 bg-white/5 hover:bg-red-500/20 border border-white/10 hover:border-red-500/50 text-red-400 font-['JetBrains_Mono'] text-sm uppercase tracking-wider transition-colors"
                        >
                          Abort Sequence
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {activeTab === 'custom' && (
                <div className="max-w-2xl mx-auto space-y-8 animate-in">
                  <div className="text-center space-y-2">
                    <h1 className="font-['Chakra_Petch'] text-4xl font-bold text-white tracking-tighter uppercase">Private Operation</h1>
                    <p className="font-['JetBrains_Mono'] text-gray-400 text-sm">Create a secure lobby or join via classified access code.</p>
                  </div>

                  <div className="bg-white/5 border border-white/10 p-8 space-y-6">
                    <div className="grid md:grid-cols-2 gap-6">
                      <div className="space-y-2">
                        <label className="font-['JetBrains_Mono'] text-xs text-gray-400 uppercase tracking-wider">Lobby Name</label>
                        <input type="text" placeholder="OPERATION_BLACKOUT" className="w-full bg-black/50 border border-white/10 focus:border-amber-500/50 focus:outline-none px-4 py-3 font-['JetBrains_Mono'] text-white placeholder-gray-600 transition-colors" />
                      </div>
                      <div className="space-y-2">
                        <label className="font-['JetBrains_Mono'] text-xs text-gray-400 uppercase tracking-wider">Max Players</label>
                        <select className="w-full bg-black/50 border border-white/10 focus:border-amber-500/50 focus:outline-none px-4 py-3 font-['JetBrains_Mono'] text-white transition-colors appearance-none">
                          <option>4 Players</option>
                          <option>8 Players</option>
                          <option>12 Players</option>
                        </select>
                      </div>
                    </div>
                    
                    <div className="pt-4 border-t border-white/10 flex gap-4">
                      <button className="flex-1 py-4 bg-amber-600 hover:bg-amber-500 text-black font-['Chakra_Petch'] font-bold text-lg uppercase tracking-wider transition-colors shadow-[0_0_20px_rgba(245,158,11,0.3)]">
                        Initialize Lobby
                      </button>
                    </div>

                    <div className="relative flex items-center py-4">
                      <div className="flex-grow border-t border-white/10"></div>
                      <span className="flex-shrink-0 mx-4 font-['JetBrains_Mono'] text-xs text-gray-500">OR JOIN EXISTING</span>
                      <div className="flex-grow border-t border-white/10"></div>
                    </div>

                    <div className="flex gap-4">
                      <input 
                        type="text" 
                        value={roomCode}
                        onChange={(e) => setRoomCode(e.target.value.toUpperCase())}
                        placeholder="ENTER 6-DIGIT CODE" 
                        maxLength={6}
                        className="flex-1 bg-black/50 border border-white/10 focus:border-cyan-500/50 focus:outline-none px-4 py-3 font-['JetBrains_Mono'] text-white text-center tracking-[0.5em] placeholder-gray-700 transition-colors" 
                      />
                      <button className="px-8 py-3 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-cyan-500/50 text-cyan-400 font-['JetBrains_Mono'] text-sm uppercase tracking-wider transition-colors">
                        Connect
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {activeTab === 'profile' && (
                <div className="max-w-4xl mx-auto space-y-8 animate-in">
                  <div className="flex items-end justify-between border-b border-white/10 pb-6">
                    <div>
                      <h1 className="font-['Chakra_Petch'] text-4xl font-bold text-white tracking-tighter uppercase mb-2">Operative Dossier</h1>
                      <p className="font-['JetBrains_Mono'] text-gray-400 text-sm">Comprehensive performance analysis and progression tracking.</p>
                    </div>
                    <div className="hidden md:block text-right">
                      <div className="font-['JetBrains_Mono'] text-xs text-gray-500">ACCOUNT CREATED</div>
                      <div className="font-['Chakra_Petch'] text-xl text-white">OCT 2023</div>
                    </div>
                  </div>

                  <div className="grid md:grid-cols-3 gap-6">
                    <div className="md:col-span-2 bg-white/5 border border-white/10 p-6">
                      <h3 className="font-['Chakra_Petch'] text-xl font-bold text-white mb-6 flex items-center gap-2">
                        <span className="w-2 h-2 bg-amber-500 rounded-sm"></span>
                        RECENT DEPLOYMENTS
                      </h3>
                      <div className="space-y-3">
                        {[1, 2, 3].map((i) => (
                          <div key={i} className="flex items-center justify-between p-4 bg-black/30 border border-white/5 hover:border-white/20 transition-colors">
                            <div className="flex items-center gap-4">
                              <div className={`w-2 h-12 rounded-sm ${i === 1 ? 'bg-green-500' : 'bg-red-500'}`} />
                              <div>
                                <div className="font-['Chakra_Petch'] font-bold text-white">Office Complex</div>
                                <div className="font-['JetBrains_Mono'] text-xs text-gray-500">2 HOURS AGO • ROLE: {i === 1 ? 'HIDER' : 'HUNTER'}</div>
                              </div>
                            </div>
                            <div className="text-right">
                              <div className={`font-['Chakra_Petch'] font-bold ${i === 1 ? 'text-green-400' : 'text-red-400'}`}>{i === 1 ? 'VICTORY' : 'DEFEAT'}</div>
                              <div className="font-['JetBrains_Mono'] text-xs text-gray-500">+{i === 1 ? '150' : '45'} XP</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="space-y-6">
                      <div className="bg-white/5 border border-white/10 p-6">
                        <h3 className="font-['Chakra_Petch'] text-lg font-bold text-white mb-4">UNLOCKED COSMETICS</h3>
                        <div className="grid grid-cols-3 gap-2">
                          {['📦', '🪑', '🪴', '🗑️', '📺', '🔒'].map((icon, idx) => (
                            <div key={idx} className={`aspect-square flex items-center justify-center text-2xl border ${idx === 5 ? 'border-white/10 bg-black/50 grayscale opacity-50' : 'border-amber-500/30 bg-amber-500/10 hover:bg-amber-500/20 transition-colors cursor-pointer'}`}>
                              {icon}
                            </div>
                          ))}
                        </div>
                      </div>
                      
                      <div className="bg-gradient-to-br from-cyan-900/20 to-blue-900/20 border border-cyan-500/20 p-6">
                        <h3 className="font-['Chakra_Petch'] text-lg font-bold text-cyan-400 mb-2">SEASON 04 PASS</h3>
                        <p className="font-['JetBrains_Mono'] text-xs text-gray-400 mb-4">Complete 5 more matches to unlock the "Golden Briefcase" prop skin.</p>
                        <div className="h-1.5 bg-black/50 rounded-sm overflow-hidden">
                          <div className="h-full w-3/4 bg-cyan-500 shadow-[0_0_10px_rgba(6,182,212,0.5)]" />
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </main>
          </div>
        </div>
      );
    }

    function NavButton({ active, onClick, icon, children }) {
      return (
        <button
          onClick={onClick}
          className={`w-full flex items-center gap-3 px-4 py-3 font-['JetBrains_Mono'] text-sm uppercase tracking-wider transition-all duration-200 border-l-2 ${
            active 
              ? 'bg-amber-500/10 border-amber-500 text-amber-500 shadow-[inset_10px_0_20px_-10px_rgba(245,158,11,0.2)]' 
              : 'border-transparent text-gray-400 hover:text-white hover:bg-white/5'
          }`}
        >
          {icon}
          <span>{children}</span>
        </button>
      );
    }

    function StatBox({ label, value, color }) {
      return (
        <div className="bg-black/30 border border-white/5 p-3">
          <div className="font-['JetBrains_Mono'] text-[10px] text-gray-500 uppercase tracking-wider mb-1">{label}</div>
          <div className={`font-['Chakra_Petch'] text-xl font-bold ${color}`}>{value}</div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PropHuntLobby />);
  </script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v833ccba57c9e4d2798f2e76cebdd09a11778172276447" integrity="sha512-57MDmcccJXYtNnH+ZiBwzC4jb2rvgVCEokYN+L/nLlmO8rfYT/gIpW2A569iJ/3b+0UEasghjuZH/ma3wIs/EQ==" data-cf-beacon='{"version":"2024.11.0","token":"75124c326cb447fe934cde04713ae013","r":1,"server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
