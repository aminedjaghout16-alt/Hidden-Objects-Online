            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
              {room.players.map(p => (
                <div key={p.id} className={`p-3 border text-center ${p.id === player.id ? 'border-amber-500/50 bg-amber-500/10' : 'border-white/10 bg-white/5'}`}>
                  <div className="font-['Chakra_Petch'] font-bold text-white text-sm truncate">{p.name}</div>
                  <div className="font-['JetBrains_Mono'] text-xs text-gray-500 mt-1">Lv.{p.level}</div>
                  {p.id === room.hostId && <div className="text-amber-400 text-xs mt-1">HOST</div>}
                </div>
              ))}
              {Array.from({ length: Math.max(0, room.maxPlayers - room.players.length) }).map((_, i) => (
                <div key={i} className="p-3 border border-white/5 bg-white/2 text-center">
                  <div className="font-['JetBrains_Mono'] text-xs text-gray-600">WAITING...</div>
                </div>
              ))}
            </div>

            {isHost && (
              <button
                onClick={startGame}
                disabled={room.players.length < 2}
                className="w-full py-4 bg-amber-600 hover:bg-amber-500 disabled:opacity-40 disabled:cursor-not-allowed text-black font-['Chakra_Petch'] font-bold text-lg uppercase tracking-wider transition-colors"
              >
                {room.players.length < 2 ? 'WAITING FOR PLAYERS...' : 'START OPERATION'}
              </button>
            )}
            {!isHost && (
              <div className="text-center font-['JetBrains_Mono'] text-sm text-gray-400 py-3 border border-white/10">
                Waiting for host to start...
              </div>
            )}
          </div>

          <ChatBox messages={chatMessages} input={chatInput} setInput={setChatInput} onSend={sendChat} chatRef={chatRef} />
        </div>
      );
    }

    // ─── In-game View ─────────────────────────────────────────────────────────
    function GameView({ room, phase, winner, myRole, myAlive, player, countdown, chatMessages, chatInput, setChatInput, sendChat, eliminate, leaveRoom, chatRef, updatePosition, setDisguise }) {
      const showMap = (phase === 'hiding' && myRole === 'hider') || phase === 'hunting';
      const hunterLocked = phase === 'hiding' && myRole === 'hunter';

      return (
        <div className="space-y-4 animate-in">
          {/* Phase banner */}
          <div className={`p-4 border text-center ${
            phase === 'ended'   ? 'border-purple-500/50 bg-purple-900/20' :
            phase === 'hiding'  ? 'border-cyan-500/50 bg-cyan-900/20' :
                                  'border-red-500/50 bg-red-900/20'}`}>
            {phase === 'hiding' && (
              <div>
                <div className="font-['Chakra_Petch'] text-2xl font-bold text-cyan-400">HIDING PHASE</div>
                <div className="font-['JetBrains_Mono'] text-4xl font-bold text-white mt-1">{countdown ?? '...'}</div>
                <div className="font-['JetBrains_Mono'] text-xs text-gray-400 mt-1">
                  {myRole === 'hider' ? 'Find a hiding spot! Move with WASD/arrows or the joystick, then click a nearby prop to disguise.' : 'Hunters are locked out — wait for the hunt to begin...'}
                </div>
              </div>
            )}
            {phase === 'hunting' && (
              <div>
                <div className="font-['Chakra_Petch'] text-2xl font-bold text-red-400">HUNTING PHASE</div>
                <div className="font-['JetBrains_Mono'] text-xs text-gray-400 mt-1">
                  You are a <span className={myRole === 'hunter' ? 'text-red-400' : 'text-cyan-400'}>{myRole?.toUpperCase()}</span>
                  {!myAlive && <span className="text-red-500 ml-2">— ELIMINATED</span>}
                  {myRole === 'hunter' && ' — aim and click/tap to shoot. Ammo regenerates slowly.'}
                  {myRole === 'hider' && ' — click a nearby prop to disguise yourself.'}
                </div>
              </div>
            )}
            {phase === 'ended' && (
              <div>
                <div className={`font-['Chakra_Petch'] text-3xl font-bold ${winner === 'hunters' ? 'text-red-400' : 'text-green-400'}`}>
                  {winner === 'hunters' ? '🎯 HUNTERS WIN' : '🏃 HIDERS ESCAPE'}
                </div>
                <button onClick={leaveRoom} className="mt-3 px-6 py-2 bg-amber-600 hover:bg-amber-500 text-black font-['Chakra_Petch'] font-bold text-sm uppercase transition-colors">
                  BACK TO LOBBY
                </button>
              </div>
            )}
          </div>

          {/* Map / locked overlay */}
          {showMap && (
            <GameMap
              room={room} player={player} myRole={myRole} myAlive={myAlive}
              phase={phase} updatePosition={updatePosition} eliminate={eliminate}
              setDisguise={setDisguise}
            />
          )}
          {hunterLocked && (
            <div className="relative h-64 md:h-96 bg-black border border-cyan-500/30 flex items-center justify-center overflow-hidden">
              <div className="absolute inset-0 opacity-20" style={{ backgroundImage: 'repeating-linear-gradient(45deg, rgba(6,182,212,0.15) 0px, rgba(6,182,212,0.15) 2px, transparent 2px, transparent 12px)' }} />
              <div className="relative z-10 text-center px-4">
                <div className="font-['Chakra_Petch'] text-xl font-bold text-cyan-400 uppercase tracking-widest mb-2">Comms Locked</div>
                <div className="font-['JetBrains_Mono'] text-xs text-gray-400">Tracking systems will activate once hiders are in position.</div>
              </div>
            </div>
          )}

          {/* Compact roster */}
          <div className="bg-black/40 border border-white/10 p-4">
            <h3 className="font-['JetBrains_Mono'] text-xs text-gray-400 uppercase mb-3">Players</h3>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
              {room.players.map(p => (
                <div key={p.id} className={`flex items-center gap-2 p-2 border ${p.id === player.id ? 'border-amber-500/30' : 'border-white/5'}`}>
                  <div className={`w-2 h-2 rounded-full flex-shrink-0 ${!p.alive ? 'bg-gray-600' : p.role === 'hunter' ? 'bg-red-400' : 'bg-cyan-400'}`} />
                  <span className="font-['JetBrains_Mono'] text-xs text-white truncate">{p.name}</span>
                  {!p.alive && <span className="font-['JetBrains_Mono'] text-[10px] text-gray-500 flex-shrink-0">(out)</span>}
                </div>
              ))}
            </div>
          </div>

          <ChatBox messages={chatMessages} input={chatInput} setInput={setChatInput} onSend={sendChat} chatRef={chatRef} />
        </div>
      );
    }

    // ─── Canvas drawing helpers ─────────────────────────────────────────────────
    // Ground shadow used under characters and props for depth.
    function drawGroundShadow(ctx, x, y, rx, ry, alpha = 0.35) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#000000';
      ctx.fill();
      ctx.restore();
    }

    // Among Us-style bean character: body, visor, optional legs (walk cycle).
    function drawCharacter(ctx, x, y, color, opts = {}) {
      const { facing = 1, walking = false, walkPhase = 0, alpha = 1, highlight = false } = opts;
      const r = PLAYER_RADIUS;

      // Soft ground shadow beneath the character
      drawGroundShadow(ctx, x, y + r * 1.05, r * 0.9, r * 0.32, 0.35 * alpha);

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(x, y);
      ctx.scale(facing, 1); // mirror horizontally based on facing direction

      // Legs (simple walk-cycle bob)
      if (walking) {
        const legOffset = Math.sin(walkPhase) * (r * 0.35);
        ctx.fillStyle = shadeColor(color, -35);
        ctx.fillRect(-r * 0.5, r * 0.55, r * 0.32, r * 0.6 + legOffset);
        ctx.fillRect(r * 0.18, r * 0.55, r * 0.32, r * 0.6 - legOffset);
      } else {
        ctx.fillStyle = shadeColor(color, -35);
        ctx.fillRect(-r * 0.5, r * 0.55, r * 0.32, r * 0.55);
        ctx.fillRect(r * 0.18, r * 0.55, r * 0.32, r * 0.55);
      }

      // Body (bean shape)
      ctx.beginPath();
      ctx.moveTo(-r * 0.95, r * 0.65);
      ctx.lineTo(-r * 0.95, -r * 0.1);
      ctx.quadraticCurveTo(-r * 0.95, -r * 1.05, 0, -r * 1.05);
      ctx.quadraticCurveTo(r * 0.95, -r * 1.05, r * 0.95, -r * 0.1);
      ctx.lineTo(r * 0.95, r * 0.65);
      ctx.quadraticCurveTo(r * 0.95, r * 1.0, r * 0.45, r * 1.0);
      ctx.lineTo(-r * 0.45, r * 1.0);
      ctx.quadraticCurveTo(-r * 0.95, r * 1.0, -r * 0.95, r * 0.65);
      ctx.closePath();

      // Glossy vertical gradient fill for a rounder, more 3D look
      const bodyGrad = ctx.createLinearGradient(0, -r * 1.05, 0, r * 1.0);
      bodyGrad.addColorStop(0, shadeColor(color, 22));
      bodyGrad.addColorStop(0.45, color);
      bodyGrad.addColorStop(1, shadeColor(color, -18));
      ctx.fillStyle = bodyGrad;
      ctx.fill();
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = shadeColor(color, -45);
      ctx.stroke();

      // Backpack hint
      ctx.beginPath();
      ctx.ellipse(-r * 0.85, r * 0.05, r * 0.22, r * 0.4, 0, 0, Math.PI * 2);
      ctx.fillStyle = shadeColor(color, -22);
      ctx.fill();

      // Top highlight sheen (matte plastic look)
      ctx.beginPath();
      ctx.ellipse(-r * 0.15, -r * 0.7, r * 0.6, r * 0.28, -0.2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fill();

      // Visor
      ctx.beginPath();
      ctx.ellipse(r * 0.15, -r * 0.25, r * 0.55, r * 0.38, -0.15, 0, Math.PI * 2);
      const visorGrad = ctx.createLinearGradient(r * 0.15 - r * 0.55, -r * 0.25 - r * 0.38, r * 0.15 + r * 0.55, -r * 0.25 + r * 0.38);
      visorGrad.addColorStop(0, '#d8f3ff');
      visorGrad.addColorStop(1, '#7fb8d9');
      ctx.fillStyle = visorGrad;
      ctx.fill();
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = '#4a7a99';
      ctx.stroke();
      // visor shine
      ctx.beginPath();
      ctx.ellipse(r * 0.05, -r * 0.38, r * 0.18, r * 0.08, -0.3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.fill();

      if (highlight) {
        ctx.beginPath();
        ctx.ellipse(0, 0, r * 1.35, r * 1.35, 0, 0, Math.PI * 2);
        ctx.strokeStyle = '#f59e0b';
        ctx.lineWidth = 2;
        ctx.shadowColor = 'rgba(245,158,11,0.6)';
        ctx.shadowBlur = 6;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      ctx.restore();
    }

    function shadeColor(hex, percent) {
      const num = parseInt(hex.replace('#', ''), 16);
      let r = (num >> 16) + Math.round(2.55 * percent);
      let g = ((num >> 8) & 0x00FF) + Math.round(2.55 * percent);
      let b = (num & 0x0000FF) + Math.round(2.55 * percent);
      r = Math.max(0, Math.min(255, r));
      g = Math.max(0, Math.min(255, g));
      b = Math.max(0, Math.min(255, b));
      return `rgb(${r},${g},${b})`;
    }

    // Draw a prop icon (plant, lamp, tv, crate, trash) at the given world position.
    function drawProp(ctx, x, y, type, alpha = 1) {
      // Ground shadow shared by all props
      const shadowSizes = {
        plant: [22, 9], lamp: [16, 7], tv: [24, 9], crate: [20, 9], trash: [14, 7],
        chair: [16, 8], barrel: [16, 8], shelf: [24, 9], vending: [20, 10], locker: [16, 9], box: [18, 8],
      };
      const [sx, sy] = shadowSizes[type] || [16, 7];
      drawGroundShadow(ctx, x, y + sy * 1.4, sx, sy, 0.32 * alpha);

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(x, y);
      switch (type) {
        case 'plant': {
          // Pot with gradient + rim
          const potGrad = ctx.createLinearGradient(0, 6, 0, 22);
          potGrad.addColorStop(0, '#9a6b3f');
          potGrad.addColorStop(1, '#6b4423');
          ctx.fillStyle = potGrad;
          ctx.beginPath();
          ctx.moveTo(-13, 6); ctx.lineTo(13, 6); ctx.lineTo(10, 22); ctx.lineTo(-10, 22);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = '#7a5230';
          ctx.fillRect(-14, 3, 28, 5);

          // Leaves — layered ellipses with two-tone green
          for (let i = -2; i <= 2; i++) {
            ctx.beginPath();
            ctx.ellipse(i * 7, -6 + Math.abs(i) * 3, 9, 16, i * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = i % 2 === 0 ? '#22c55e' : '#16a34a';
            ctx.fill();
            // leaf vein highlight
            ctx.beginPath();
            ctx.ellipse(i * 7 - 2, -10 + Math.abs(i) * 3, 3, 9, i * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fill();
          }
          break;
        }
        case 'lamp': {
          // Pole
          const poleGrad = ctx.createLinearGradient(-3, 0, 3, 0);
          poleGrad.addColorStop(0, '#3f3f46');
          poleGrad.addColorStop(0.5, '#71717a');
          poleGrad.addColorStop(1, '#3f3f46');
          ctx.fillStyle = poleGrad;
          ctx.fillRect(-3, 0, 6, 26);
          // base
          ctx.fillStyle = '#27272a';
          ctx.beginPath();
          ctx.ellipse(0, 26, 10, 3.5, 0, 0, Math.PI * 2);
          ctx.fill();
          // shade
          ctx.beginPath();
          ctx.moveTo(-16, 0);
          ctx.lineTo(16, 0);
          ctx.lineTo(10, -22);
          ctx.lineTo(-10, -22);
          ctx.closePath();
          const shadeGrad = ctx.createLinearGradient(0, -22, 0, 0);
          shadeGrad.addColorStop(0, '#fff3c4');
          shadeGrad.addColorStop(1, '#fbbf24');
          ctx.fillStyle = shadeGrad;
          ctx.fill();
          ctx.strokeStyle = '#a16207';
          ctx.lineWidth = 1.5;
          ctx.stroke();
          // glow
          ctx.beginPath();
          ctx.ellipse(0, -11, 18, 18, 0, 0, Math.PI * 2);
          const glowGrad = ctx.createRadialGradient(0, -11, 2, 0, -11, 18);
          glowGrad.addColorStop(0, 'rgba(253,224,71,0.5)');
          glowGrad.addColorStop(1, 'rgba(253,224,71,0)');
          ctx.fillStyle = glowGrad;
          ctx.fill();
          break;
        }
        case 'tv': {
          // Stand
          ctx.fillStyle = '#27272a';
          ctx.fillRect(-7, 12, 14, 6);
          ctx.fillStyle = '#18181b';
          ctx.beginPath();
          ctx.ellipse(0, 19, 14, 3, 0, 0, Math.PI * 2);
          ctx.fill();
          // Body with gradient
          const tvGrad = ctx.createLinearGradient(0, -16, 0, 12);
          tvGrad.addColorStop(0, '#3f3f46');
          tvGrad.addColorStop(1, '#0f0f12');
          ctx.fillStyle = tvGrad;
          ctx.fillRect(-22, -16, 44, 28);
          // Screen with glow gradient
          const screenGrad = ctx.createLinearGradient(-18, -12, 18, 8);
          screenGrad.addColorStop(0, '#7dd3fc');
          screenGrad.addColorStop(0.5, '#38bdf8');
          screenGrad.addColorStop(1, '#0ea5e9');
          ctx.fillStyle = screenGrad;
          ctx.globalAlpha = alpha * 0.85;
          ctx.fillRect(-18, -12, 36, 20);
          ctx.globalAlpha = alpha;
          // screen scanline
          ctx.fillStyle = 'rgba(255,255,255,0.25)';
          ctx.fillRect(-18, -12, 36, 3);
          // bezel highlight
          ctx.strokeStyle = 'rgba(255,255,255,0.08)';
          ctx.lineWidth = 1;
          ctx.strokeRect(-22, -16, 44, 28);
          break;
        }
        case 'crate': {
          const crateGrad = ctx.createLinearGradient(-18, -18, 18, 18);
          crateGrad.addColorStop(0, '#c98b2e');
          crateGrad.addColorStop(1, '#8a5a18');
          ctx.fillStyle = crateGrad;
          ctx.fillRect(-18, -18, 36, 36);
          ctx.strokeStyle = '#5c3b10';
          ctx.lineWidth = 2;
          ctx.strokeRect(-18, -18, 36, 36);
          // diagonal planks
          ctx.beginPath();
          ctx.moveTo(-18, -18); ctx.lineTo(18, 18);
          ctx.moveTo(18, -18); ctx.lineTo(-18, 18);
          ctx.stroke();
          // metal corner brackets
          ctx.fillStyle = 'rgba(255,255,255,0.18)';
          ctx.fillRect(-18, -18, 8, 3);
          ctx.fillRect(-18, -18, 3, 8);
          ctx.fillRect(10, 15, 8, 3);
          ctx.fillRect(15, 10, 3, 8);
          break;
        }
        case 'trash': {
          const trashGrad = ctx.createLinearGradient(-14, -16, 14, 18);
          trashGrad.addColorStop(0, '#71717a');
          trashGrad.addColorStop(1, '#3f3f46');
          ctx.fillStyle = trashGrad;
          ctx.beginPath();
          ctx.moveTo(-14, -16);
          ctx.lineTo(14, -16);
          ctx.lineTo(11, 18);
          ctx.lineTo(-11, 18);
          ctx.closePath();
          ctx.fill();
          // vertical ribs
          ctx.strokeStyle = 'rgba(0,0,0,0.2)';
          ctx.lineWidth = 1;
          for (let i = -1; i <= 1; i++) {
            ctx.beginPath();
            ctx.moveTo(i * 7, -14);
            ctx.lineTo(i * 6, 16);
            ctx.stroke();
          }
          // lid
          ctx.fillStyle = '#a1a1aa';
          ctx.fillRect(-17, -20, 34, 6);
          ctx.fillStyle = 'rgba(255,255,255,0.25)';
          ctx.fillRect(-17, -20, 34, 2);
          break;
        }
        case 'chair': {
          // Seat
          const seatGrad = ctx.createLinearGradient(-14, -2, 14, 10);
          seatGrad.addColorStop(0, '#a78bfa');
          seatGrad.addColorStop(1, '#7c3aed');
          ctx.fillStyle = seatGrad;
          ctx.fillRect(-14, -2, 28, 8);
          // Backrest
          ctx.fillStyle = '#7c3aed';
          ctx.fillRect(-14, -22, 6, 22);
          ctx.fillStyle = 'rgba(255,255,255,0.15)';
          ctx.fillRect(-14, -22, 6, 6);
          // Legs
          ctx.fillStyle = '#3f3f46';
          ctx.fillRect(-12, 6, 3, 14);
          ctx.fillRect(9, 6, 3, 14);
          ctx.fillRect(-12, -2, 3, 8);
          ctx.fillRect(9, -2, 3, 8);
          break;
        }
        case 'barrel': {
          const barrelGrad = ctx.createLinearGradient(-14, -18, 14, 18);
          barrelGrad.addColorStop(0, '#fb923c');
          barrelGrad.addColorStop(1, '#c2410c');
          ctx.fillStyle = barrelGrad;
          ctx.beginPath();
          ctx.moveTo(-14, -18); ctx.lineTo(14, -18);
          ctx.quadraticCurveTo(17, 0, 14, 18);
          ctx.lineTo(-14, 18);
          ctx.quadraticCurveTo(-17, 0, -14, -18);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = '#7c2d12';
          ctx.lineWidth = 1.5;
          ctx.stroke();
          // metal bands
          ctx.fillStyle = 'rgba(0,0,0,0.25)';
          ctx.fillRect(-17, -10, 34, 4);
          ctx.fillRect(-17, 6, 34, 4);
          // highlight
          ctx.fillStyle = 'rgba(255,255,255,0.2)';
          ctx.fillRect(-9, -16, 4, 30);
          break;
        }
        case 'shelf': {
          // Frame
          ctx.fillStyle = '#92633a';
          ctx.fillRect(-24, -24, 48, 48);
          ctx.fillStyle = '#6b4423';
          ctx.fillRect(-24, -24, 48, 4);
          ctx.fillRect(-24, -2, 48, 4);
          ctx.fillRect(-24, 20, 48, 4);
          // Items on shelves
          const itemColors = ['#ef4444', '#3b82f6', '#22c55e', '#eab308', '#a855f7', '#f97316'];
          let ci = 0;
          for (const sy of [-20, 2]) {
            for (let i = -2; i <= 1; i++) {
              ctx.fillStyle = itemColors[ci % itemColors.length];
              ctx.fillRect(-20 + (i + 2) * 11, sy, 8, 14);
              ci++;
            }
          }
          ctx.strokeStyle = '#4b2e15';
          ctx.lineWidth = 2;
          ctx.strokeRect(-24, -24, 48, 48);
          break;
        }
        case 'vending': {
          const vendGrad = ctx.createLinearGradient(-18, -30, 18, 20);
          vendGrad.addColorStop(0, '#ef4444');
          vendGrad.addColorStop(1, '#991b1b');
          ctx.fillStyle = vendGrad;
          ctx.fillRect(-18, -30, 36, 50);
          // glass front
          ctx.fillStyle = 'rgba(125,211,252,0.35)';
          ctx.fillRect(-14, -26, 28, 30);
          // product rows
          ctx.fillStyle = 'rgba(255,255,255,0.4)';
          for (let row = 0; row < 3; row++) {
            for (let col = 0; col < 3; col++) {
              ctx.fillRect(-12 + col * 9, -24 + row * 9, 6, 7);
            }
          }
          // buttons / keypad
          ctx.fillStyle = '#fde047';
          ctx.fillRect(4, 6, 10, 10);
          ctx.fillStyle = 'rgba(255,255,255,0.15)';
          ctx.fillRect(-18, -30, 36, 3);
          break;
        }
        case 'locker': {
          const lockerGrad = ctx.createLinearGradient(-14, -28, 14, 26);
          lockerGrad.addColorStop(0, '#60a5fa');
          lockerGrad.addColorStop(1, '#1d4ed8');
          ctx.fillStyle = lockerGrad;
          ctx.fillRect(-14, -28, 28, 54);
          // vertical vents
          ctx.fillStyle = 'rgba(0,0,0,0.2)';
          for (let i = -1; i <= 1; i++) {
            ctx.fillRect(-2 + i * 5, -24, 1.5, 16);
          }
          // handle
          ctx.fillStyle = '#1e3a8a';
          ctx.fillRect(8, -4, 4, 8);
          ctx.strokeStyle = '#1e40af';
          ctx.lineWidth = 1.5;
          ctx.strokeRect(-14, -28, 28, 54);
          ctx.fillStyle = 'rgba(255,255,255,0.15)';
          ctx.fillRect(-14, -28, 28, 4);
          break;
        }
        case 'box': {
          // Stack of two boxes
          const boxGrad1 = ctx.createLinearGradient(-16, -2, 16, 18);
          boxGrad1.addColorStop(0, '#d4a35a');
          boxGrad1.addColorStop(1, '#a9763a');
          ctx.fillStyle = boxGrad1;
          ctx.fillRect(-16, -2, 32, 20);
          ctx.strokeStyle = '#7c5424';
          ctx.lineWidth = 1.5;
          ctx.strokeRect(-16, -2, 32, 20);

          const boxGrad2 = ctx.createLinearGradient(-12, -20, 10, -2);
          boxGrad2.addColorStop(0, '#e8c084');
          boxGrad2.addColorStop(1, '#c0935a');
          ctx.fillStyle = boxGrad2;
          ctx.fillRect(-11, -20, 22, 18);
          ctx.strokeStyle = '#7c5424';
          ctx.strokeRect(-11, -20, 22, 18);

          // tape lines
          ctx.fillStyle = 'rgba(255,255,255,0.3)';
          ctx.fillRect(-1, -20, 2, 18);
          ctx.fillRect(-1, -2, 2, 20);
          break;
        }
        // ── SOFA ─────────────────────────────────────────────────────
        case 'sofa': {
          // body
          ctx.fillStyle = '#8b5e3c';
          ctx.beginPath(); ctx.roundRect(-22, -10, 44, 22, 5); ctx.fill();
          // backrest
          ctx.fillStyle = '#a0714f';
          ctx.beginPath(); ctx.roundRect(-22, -18, 44, 10, 4); ctx.fill();
          // armrests
          ctx.fillStyle = '#7a5230';
          ctx.fillRect(-24, -10, 5, 18);
          ctx.fillRect(19,  -10, 5, 18);
          // cushion line
          ctx.strokeStyle = '#6b4526'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(0, 12); ctx.stroke();
          break;
        }

        // ── DESK ─────────────────────────────────────────────────────
        case 'desk': {
          // legs
          ctx.fillStyle = '#78583a';
          ctx.fillRect(-20, 10, 5, 10);
          ctx.fillRect(15,  10, 5, 10);
          // surface
          ctx.fillStyle = '#c8a96e';
          ctx.beginPath(); ctx.roundRect(-22, -10, 44, 22, 3); ctx.fill();
          // edge detail
          ctx.strokeStyle = '#a07840'; ctx.lineWidth = 1;
          ctx.strokeRect(-22, -10, 44, 22);
          break;
        }

        // ── MONITOR ──────────────────────────────────────────────────
        case 'monitor': {
          // stand
          ctx.fillStyle = '#4b5563';
          ctx.fillRect(-3, 12, 6, 8);
          ctx.fillRect(-8, 18, 16, 3);
          // screen bezel
          ctx.fillStyle = '#1f2937';
          ctx.beginPath(); ctx.roundRect(-18, -14, 36, 28, 3); ctx.fill();
          // screen glow (cyan-ish)
          ctx.fillStyle = '#0e7490';
          ctx.fillRect(-14, -10, 28, 20);
          // screen glare
          ctx.fillStyle = 'rgba(255,255,255,0.15)';
          ctx.beginPath(); ctx.moveTo(-12,-8); ctx.lineTo(-4,-8); ctx.lineTo(-12,2); ctx.closePath(); ctx.fill();
          break;
        }

        // ── FILING CABINET ───────────────────────────────────────────
        case 'filing_cabinet': {
          ctx.fillStyle = '#6b7280';
          ctx.beginPath(); ctx.roundRect(-14, -20, 28, 40, 2); ctx.fill();
          // drawer dividers
          ctx.strokeStyle = '#4b5563'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(-14, -5); ctx.lineTo(14, -5); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(-14,  9); ctx.lineTo(14,  9); ctx.stroke();
          // handles
          ctx.fillStyle = '#9ca3af';
          ctx.fillRect(-5, -13, 10, 3);
          ctx.fillRect(-5,   1, 10, 3);
          ctx.fillRect(-5,  15, 10, 3);
          break;
        }

        // ── COUNTER (kitchen / break room table) ─────────────────────
        case 'counter': {
          // cabinet body
          ctx.fillStyle = '#d1d5db';
          ctx.beginPath(); ctx.roundRect(-22, -8, 44, 24, 3); ctx.fill();
          // countertop
          ctx.fillStyle = '#f9fafb';
          ctx.beginPath(); ctx.roundRect(-23, -12, 46, 8, 2); ctx.fill();
          // cabinet door line
          ctx.strokeStyle = '#9ca3af'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(0, 16); ctx.stroke();
          // knobs
          ctx.fillStyle = '#6b7280';
          ctx.beginPath(); ctx.arc(-8, 4, 2, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc( 8, 4, 2, 0, Math.PI*2); ctx.fill();
          break;
        }

        // ── FRIDGE ───────────────────────────────────────────────────
        case 'fridge': {
          // body
          ctx.fillStyle = '#e5e7eb';
          ctx.beginPath(); ctx.roundRect(-16, -24, 32, 48, 4); ctx.fill();
          // door split line
          ctx.strokeStyle = '#9ca3af'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(-16, 2); ctx.lineTo(16, 2); ctx.stroke();
          // handles
          ctx.fillStyle = '#9ca3af';
          ctx.fillRect(9, -18, 4, 12);
          ctx.fillRect(9,   6, 4, 10);
          // top freezer tint
          ctx.fillStyle = 'rgba(147,197,253,0.25)';
          ctx.beginPath(); ctx.roundRect(-14,-22, 28, 22, 3); ctx.fill();
          break;
        }

        // ── STOVE ────────────────────────────────────────────────────
        case 'stove': {
          // body
          ctx.fillStyle = '#374151';
          ctx.beginPath(); ctx.roundRect(-20, -18, 40, 36, 3); ctx.fill();
          // burners (4)
          const bPos = [[-10,-8],[10,-8],[-10,8],[10,8]];
          bPos.forEach(([bx,by]) => {
            ctx.strokeStyle = '#6b7280'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(bx, by, 7, 0, Math.PI*2); ctx.stroke();
            ctx.strokeStyle = '#4b5563'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(bx, by, 4, 0, Math.PI*2); ctx.stroke();
          });
          // control knobs
          ctx.fillStyle = '#9ca3af';
          [-14,-7,0,7].forEach(kx => {
            ctx.beginPath(); ctx.arc(kx, 20, 3, 0, Math.PI*2); ctx.fill();
          });
          break;
        }

        // ── TOILET ───────────────────────────────────────────────────
        case 'toilet': {
          // tank
          ctx.fillStyle = '#e5e7eb';
          ctx.beginPath(); ctx.roundRect(-12, -22, 24, 14, 3); ctx.fill();
          ctx.strokeStyle = '#d1d5db'; ctx.lineWidth = 0.5; ctx.stroke();
          // bowl
          ctx.fillStyle = '#f3f4f6';
          ctx.beginPath(); ctx.ellipse(0, 8, 14, 18, 0, 0, Math.PI*2); ctx.fill();
          ctx.strokeStyle = '#d1d5db'; ctx.lineWidth = 0.5; ctx.stroke();
          // bowl interior
          ctx.fillStyle = '#bfdbfe';
          ctx.beginPath(); ctx.ellipse(0, 10, 9, 12, 0, 0, Math.PI*2); ctx.fill();
          break;
        }

        // ── SINK ─────────────────────────────────────────────────────
        case 'sink': {
          // cabinet
          ctx.fillStyle = '#d1d5db';
          ctx.beginPath(); ctx.roundRect(-18, -6, 36, 24, 3); ctx.fill();
          // basin
          ctx.fillStyle = '#e5e7eb';
          ctx.beginPath(); ctx.roundRect(-14, -14, 28, 20, 4); ctx.fill();
          ctx.strokeStyle = '#9ca3af'; ctx.lineWidth = 0.5; ctx.stroke();
          // basin interior (water tint)
          ctx.fillStyle = 'rgba(147,197,253,0.35)';
          ctx.beginPath(); ctx.roundRect(-11, -11, 22, 14, 3); ctx.fill();
          // faucet
          ctx.fillStyle = '#9ca3af';
          ctx.fillRect(-2, -18, 4, 8);
          ctx.fillRect(-6, -18, 12, 3);
          break;
        }

        // ── BED ──────────────────────────────────────────────────────
        case 'bed': {
          // frame
          ctx.fillStyle = '#78583a';
          ctx.beginPath(); ctx.roundRect(-26, -20, 52, 40, 4); ctx.fill();
          // headboard
          ctx.fillStyle = '#5a3e22';
          ctx.beginPath(); ctx.roundRect(-26, -20, 52, 10, 4); ctx.fill();
          // mattress
          ctx.fillStyle = '#f9fafb';
          ctx.beginPath(); ctx.roundRect(-22, -9, 44, 26, 3); ctx.fill();
          // pillow
          ctx.fillStyle = '#dbeafe';
          ctx.beginPath(); ctx.roundRect(-18, -7, 16, 10, 3); ctx.fill();
          ctx.beginPath(); ctx.roundRect( 2, -7, 16, 10, 3); ctx.fill();
          // blanket
          ctx.fillStyle = '#93c5fd';
          ctx.beginPath(); ctx.roundRect(-22, 4, 44, 12, 2); ctx.fill();
          // blanket fold line
          ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = 0.5;
          ctx.beginPath(); ctx.moveTo(-22,8); ctx.lineTo(22,8); ctx.stroke();
          break;
        }

        // ── SERVER RACK ──────────────────────────────────────────────
        case 'server_rack': {
          // enclosure
          ctx.fillStyle = '#1f2937';
          ctx.beginPath(); ctx.roundRect(-14, -24, 28, 48, 2); ctx.fill();
          ctx.strokeStyle = '#374151'; ctx.lineWidth = 0.5; ctx.stroke();
          // rack units
          const uColors = ['#22c55e','#3b82f6','#22c55e','#f59e0b','#3b82f6'];
          uColors.forEach((c, i) => {
            ctx.fillStyle = '#374151';
            ctx.fillRect(-12, -21 + i*9, 24, 7);
            // status LED
            ctx.fillStyle = c;
            ctx.beginPath(); ctx.arc(8, -21 + i*9 + 3, 2, 0, Math.PI*2); ctx.fill();
            // unit lines
            ctx.fillStyle = '#4b5563';
            ctx.fillRect(-10, -21 + i*9 + 2, 14, 3);
          });
          break;
        }

        // ── WORKBENCH ────────────────────────────────────────────────
        case 'workbench': {
          // legs
          ctx.fillStyle = '#92400e';
          ctx.fillRect(-22, 12, 5, 12);
          ctx.fillRect(17,  12, 5, 12);
          // surface
          ctx.fillStyle = '#b45309';
          ctx.beginPath(); ctx.roundRect(-24, -6, 48, 20, 2); ctx.fill();
          // pegboard back
          ctx.fillStyle = '#78350f';
          ctx.beginPath(); ctx.roundRect(-20, -20, 40, 16, 1); ctx.fill();
          // pegs (dots)
          ctx.fillStyle = '#92400e';
          for (let px = -16; px <= 16; px += 8) {
            ctx.beginPath(); ctx.arc(px, -12, 1.5, 0, Math.PI*2); ctx.fill();
          }
          // tool on surface (wrench silhouette)
          ctx.fillStyle = '#6b7280';
          ctx.fillRect(-8, -3, 16, 4);
          ctx.beginPath(); ctx.arc(-8, -1, 4, 0, Math.PI*2); ctx.fill();
          break;
        }

        // ── BENCH ────────────────────────────────────────────────────
        case 'bench': {
          // seat planks
          ctx.fillStyle = '#a16207';
          ctx.beginPath(); ctx.roundRect(-22, -5, 44, 10, 2); ctx.fill();
          // plank line
          ctx.strokeStyle = '#854d0e'; ctx.lineWidth = 0.5;
          ctx.beginPath(); ctx.moveTo(0,-5); ctx.lineTo(0,5); ctx.stroke();
          // legs
          ctx.fillStyle = '#78350f';
          ctx.fillRect(-20,  5, 5, 10);
          ctx.fillRect( 15,  5, 5, 10);
          break;
        }

        // ── BOOKCASE ─────────────────────────────────────────────────
        case 'bookcase': {
          // frame
          ctx.fillStyle = '#92400e';
          ctx.beginPath(); ctx.roundRect(-18, -24, 36, 48, 2); ctx.fill();
          // shelves + books
          const bookColors = ['#ef4444','#3b82f6','#22c55e','#f59e0b','#a855f7','#ec4899'];
          [-18,-6,6,18].forEach((sy, si) => {
            ctx.fillStyle = '#78350f';
            ctx.fillRect(-16, sy, 32, 2); // shelf plank
            // books on this shelf
            let bx = -15;
            for (let b = 0; b < 5; b++) {
              ctx.fillStyle = bookColors[(si*5+b) % bookColors.length];
              const bw = 5 + Math.floor((si*7+b*3) % 4);
              ctx.fillRect(bx, sy-10, bw, 10);
              bx += bw + 1;
            }
          });
          break;
        }

        // ── COFFEE MACHINE ───────────────────────────────────────────
        case 'coffee_machine': {
          // body
          ctx.fillStyle = '#111827';
          ctx.beginPath(); ctx.roundRect(-14, -18, 28, 36, 4); ctx.fill();
          // display panel
          ctx.fillStyle = '#1e3a5f';
          ctx.beginPath(); ctx.roundRect(-10, -14, 20, 10, 2); ctx.fill();
          ctx.fillStyle = '#38bdf8';
          ctx.fillRect(-8, -12, 16, 6);
          // spout
          ctx.fillStyle = '#374151';
          ctx.fillRect(-3, 0, 6, 8);
          ctx.fillRect(-6, 7, 12, 3);
          // cup
          ctx.fillStyle = '#f9fafb';
          ctx.beginPath(); ctx.roundRect(-7, 10, 14, 10, 2); ctx.fill();
          // buttons
          ctx.fillStyle = '#22c55e';
          ctx.beginPath(); ctx.arc(-6, -2, 3, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#ef4444';
          ctx.beginPath(); ctx.arc( 6, -2, 3, 0, Math.PI*2); ctx.fill();
          break;
        }

        // ── RECEPTION DESK ───────────────────────────────────────────
        case 'reception_desk': {
          // main desk body
          ctx.fillStyle = '#d1fae5';
          ctx.beginPath(); ctx.roundRect(-26, -14, 52, 28, 4); ctx.fill();
          ctx.strokeStyle = '#6ee7b7'; ctx.lineWidth = 1; ctx.stroke();
          // top panel (raised counter)
          ctx.fillStyle = '#a7f3d0';
          ctx.beginPath(); ctx.roundRect(-26, -14, 52, 10, 4); ctx.fill();
          // monitor on desk
          ctx.fillStyle = '#1f2937';
          ctx.beginPath(); ctx.roundRect(-10, -22, 20, 12, 2); ctx.fill();
          ctx.fillStyle = '#0e7490';
          ctx.fillRect(-8, -20, 16, 8);
          // monitor stand
          ctx.fillStyle = '#374151';
          ctx.fillRect(-2, -10, 4, 4);
          // nameplate
          ctx.fillStyle = '#6ee7b7';
          ctx.beginPath(); ctx.roundRect(-12, 2, 24, 6, 1); ctx.fill();
          break;
        }

        default: {
          ctx.fillStyle = '#6b7280';
          ctx.fillRect(-14, -14, 28, 28);
        }
      }
      ctx.restore();
    }

    // ─── 2D Game Map (canvas) ───────────────────────────────────────────────────
    function GameMap({ room, player, myRole, myAlive, phase, updatePosition, eliminate, setDisguise }) {
      const canvasRef    = useRef(null);
      const wrapRef      = useRef(null);
      const posRef       = useRef({ x: WORLD_W / 2, y: WORLD_H / 2 });
      const keysRef      = useRef({ up: false, down: false, left: false, right: false });
      const joyRef       = useRef({ active: false, dx: 0, dy: 0 });
      const playersRef   = useRef(room.players);
      const eliminatedRef = useRef(new Set());
      const rafRef       = useRef(null);
      const lastTsRef    = useRef(null);
      const facingRef    = useRef(1);       // 1 = right, -1 = left
      const walkPhaseRef = useRef(0);
      const disguiseRef  = useRef(null);    // prop type string or null
      const aimRef       = useRef({ x: WORLD_W / 2, y: WORLD_H / 2 }); // world coords
      const bulletsRef   = useRef([]);      // local + remote bullets for rendering
      const ammoRef      = useRef(MAX_AMMO);
      const ammoTimerRef = useRef(Date.now());
      const shotsSeenRef = useRef(new Set());
      const [ammoDisplay, setAmmoDisplay] = useState(MAX_AMMO);
      const [disguiseDisplay, setDisguiseDisplay] = useState(null);

      const code = room.code;

      // Keep latest players list (for remote rendering + eliminate checks)
      // without re-triggering the animation loop on every Firebase tick.
      useEffect(() => { playersRef.current = room.players; }, [room.players]);

      // Initialize local position + disguise from server once when this
      // player first gets a position (e.g. on spawn / role assignment).
      const initedRef = useRef(false);
      useEffect(() => {
        const me = room.players.find(p => p.id === player.id);
        if (!initedRef.current && me && typeof me.x === 'number' && typeof me.y === 'number') {
          posRef.current = { x: me.x, y: me.y };
          initedRef.current = true;
        }
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [room.players]);

      // ── Listen for shot events broadcast by hunters (cosmetic bullets) ───────
      useEffect(() => {
        if (!code) return;
        const shotsRef = db.ref(`rooms/${code}/shots`);
        const cb = shotsRef.limitToLast(20).on('child_added', snap => {
          const shot = snap.val();
          const id = snap.key;
          if (!shot || shotsSeenRef.current.has(id)) return;
          shotsSeenRef.current.add(id);
          // Don't double-render the shooter's own bullet (already added locally on fire)
          if (shot.shooterId === player.id) return;
          if (Date.now() - shot.ts > 1500) return; // stale, skip
          bulletsRef.current.push({
            x: shot.x, y: shot.y, dx: shot.dx, dy: shot.dy, traveled: 0, shooterId: shot.shooterId,
          });
        });
        return () => shotsRef.off('child_added', cb);
      }, [code, player.id]);

      // ── Keyboard controls ──────────────────────────────────────────────────
      useEffect(() => {
        const isTyping = () => {
          const el = document.activeElement;
          return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA');
        };
        const down = (e) => {
          if (isTyping()) return;
          switch (e.key) {
            case 'w': case 'W': case 'ArrowUp':    keysRef.current.up = true; break;
            case 's': case 'S': case 'ArrowDown':  keysRef.current.down = true; break;
            case 'a': case 'A': case 'ArrowLeft':  keysRef.current.left = true; break;
            case 'd': case 'D': case 'ArrowRight': keysRef.current.right = true; break;
            default: return;
          }
          e.preventDefault();
        };
        const up = (e) => {
          switch (e.key) {
            case 'w': case 'W': case 'ArrowUp':    keysRef.current.up = false; break;
            case 's': case 'S': case 'ArrowDown':  keysRef.current.down = false; break;
            case 'a': case 'A': case 'ArrowLeft':  keysRef.current.left = false; break;
            case 'd': case 'D': case 'ArrowRight': keysRef.current.right = false; break;
            default: return;
          }
        };
        window.addEventListener('keydown', down);
        window.addEventListener('keyup', up);
        return () => {
          window.removeEventListener('keydown', down);
          window.removeEventListener('keyup', up);
        };
      }, []);

      // ── Responsive canvas sizing ─────────────────────────────────────────────
      useEffect(() => {
        const canvas = canvasRef.current;
        const wrap = wrapRef.current;
        if (!canvas || !wrap) return;

        const resize = () => {
          const rect = wrap.getBoundingClientRect();
          if (rect.width === 0 || rect.height === 0) return;
          const dpr = window.devicePixelRatio || 1;
          const w = Math.round(rect.width * dpr);
          const h = Math.round(rect.height * dpr);
          if (canvas.width !== w) canvas.width = w;
          if (canvas.height !== h) canvas.height = h;
          canvas.style.width = `${rect.width}px`;
          canvas.style.height = `${rect.height}px`;
        };
        resize();

        const ro = new ResizeObserver(resize);
        ro.observe(wrap);
        window.addEventListener('resize', resize);
        return () => {
          ro.disconnect();
          window.removeEventListener('resize', resize);
        };
      }, []);

      // ── Helpers: world <-> screen coordinate transform ───────────────────────
      // The camera follows the local player at a fixed zoom (CAMERA_VIEW_H world
      // units visible vertically), clamped so it never shows past the world edges.
      const getTransform = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas || canvas.width === 0 || canvas.height === 0) return null;
        const scale = canvas.height / CAMERA_VIEW_H;
        const viewW = canvas.width / scale;
        const viewH = CAMERA_VIEW_H;

        let camX = posRef.current.x;
        let camY = posRef.current.y;

        // Clamp camera so the view stays within the world bounds (or centers
        // the world if the world is smaller than the view on that axis).
        if (viewW >= WORLD_W) camX = WORLD_W / 2;
        else camX = Math.max(viewW / 2, Math.min(WORLD_W - viewW / 2, camX));

        if (viewH >= WORLD_H) camY = WORLD_H / 2;
        else camY = Math.max(viewH / 2, Math.min(WORLD_H - viewH / 2, camY));

        const offX = canvas.width / 2 - camX * scale;
        const offY = canvas.height / 2 - camY * scale;
        return { scale, offX, offY, viewW, viewH, camX, camY };
      }, []);

      const screenToWorld = useCallback((clientX, clientY) => {
        const canvas = canvasRef.current;
        const t = getTransform();
        if (!canvas || !t) return null;
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        const cx = (clientX - rect.left) * dpr;
        const cy = (clientY - rect.top) * dpr;
        return {
          x: (cx - t.offX) / t.scale,
          y: (cy - t.offY) / t.scale,
        };
      }, [getTransform]);

      // ── Fire a bullet (hunters) ──────────────────────────────────────────────
      const fireBullet = useCallback((worldPt) => {
        if (myRole !== 'hunter' || phase !== 'hunting' || myAlive === false) return;
        if (ammoRef.current < 1) return;
        const px = posRef.current.x, py = posRef.current.y;
        const dx = worldPt.x - px, dy = worldPt.y - py;
        const len = Math.hypot(dx, dy) || 1;
        const ndx = dx / len, ndy = dy / len;

        ammoRef.current -= 1;
        setAmmoDisplay(ammoRef.current);

        bulletsRef.current.push({ x: px, y: py, dx: ndx, dy: ndy, traveled: 0, shooterId: player.id });

        if (code) {
          db.ref(`rooms/${code}/shots`).push({
            shooterId: player.id, x: px, y: py, dx: ndx, dy: ndy, ts: Date.now(),
          }).then(ref => {
            // Auto-clean shot record after it's done traveling
            setTimeout(() => ref.remove().catch(() => {}), 2000);
          }).catch(() => {});
        }
      }, [myRole, phase, myAlive, player.id, code]);

      // ── Disguise toggle (hiders) ─────────────────────────────────────────────
      const tryDisguise = useCallback((worldPt) => {
        if (myRole !== 'hider' || myAlive === false) return;
        if (disguiseRef.current) {
          // Already disguised — revert
          disguiseRef.current = null;
          setDisguiseDisplay(null);
          setDisguise(null);
          return;
        }
        // Find a prop within range of both the player and the click point
        for (const prop of PROPS) {
          const dPlayer = Math.hypot(prop.x - posRef.current.x, prop.y - posRef.current.y);
          const dClick = Math.hypot(prop.x - worldPt.x, prop.y - worldPt.y);
          if (dPlayer <= DISGUISE_RANGE && dClick <= PROP_RADIUS) {
            disguiseRef.current = prop.type;
            setDisguiseDisplay(prop.type);
            setDisguise(prop.type);
            return;
          }
        }
      }, [myRole, myAlive, setDisguise]);

      // ── Pointer handling on canvas (aim for hunters, disguise for hiders) ────
      const onCanvasPointerMove = useCallback((e) => {
        const pt = screenToWorld(e.clientX, e.clientY);
        if (pt) aimRef.current = pt;
      }, [screenToWorld]);

      const onCanvasPointerDown = useCallback((e) => {
        const pt = screenToWorld(e.clientX, e.clientY);
        if (!pt) return;
        aimRef.current = pt;
        if (myRole === 'hunter' && phase === 'hunting') {
          fireBullet(pt);
        } else if (myRole === 'hider') {
          tryDisguise(pt);
        }
      }, [myRole, phase, fireBullet, tryDisguise]);

      // ── Main loop: movement + render ─────────────────────────────────────────
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const canMove = myAlive !== false;

        const frame = (ts) => {
          if (lastTsRef.current == null) lastTsRef.current = ts;
          const dt = Math.min(0.05, (ts - lastTsRef.current) / 1000);
          lastTsRef.current = ts;

          // ── Ammo regeneration (hunters) ──────────────────────────────────
          if (myRole === 'hunter') {
            const now = Date.now();
            while (ammoRef.current < MAX_AMMO && now - ammoTimerRef.current >= AMMO_REGEN_MS) {
              ammoRef.current += 1;
              ammoTimerRef.current += AMMO_REGEN_MS;
              setAmmoDisplay(ammoRef.current);
            }
            if (ammoRef.current >= MAX_AMMO) ammoTimerRef.current = now;
          }

          // ── Compute movement vector from keyboard + joystick ──────────────
          let dx = 0, dy = 0;
          const k = keysRef.current;
          if (k.up) dy -= 1;
          if (k.down) dy += 1;
          if (k.left) dx -= 1;
          if (k.right) dx += 1;
          const j = joyRef.current;
          if (j.active) { dx += j.dx; dy += j.dy; }

          const moving = dx !== 0 || dy !== 0;
          if (canMove && moving) {
            const speedMult = disguiseRef.current ? DISGUISE_MOVE_MULT : 1;
            const len = Math.hypot(dx, dy) || 1;
            const normX = (dx / len) * MOVE_SPEED * speedMult * dt;
            const normY = (dy / len) * MOVE_SPEED * speedMult * dt;
            const resolved = resolveMove(posRef.current.x, posRef.current.y, normX, normY, WALLS, PLAYER_RADIUS);
            posRef.current = resolved;
            updatePosition(resolved.x, resolved.y, disguiseRef.current);
            if (normX > 0.01) facingRef.current = 1;
            else if (normX < -0.01) facingRef.current = -1;
            walkPhaseRef.current += dt * 12;
          }

          // ── Update bullets (movement + collision) ──────────────────────────
          const bullets = bulletsRef.current;
          for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            const step = BULLET_SPEED * dt;
            const nx = b.x + b.dx * step;
            const ny = b.y + b.dy * step;
            b.traveled += step;

            // Wall collision
            if (collides(nx, ny, WALLS, 2)) {
              bullets.splice(i, 1);
              continue;
            }
            // Out of bounds / max range
            if (nx < 0 || nx > WORLD_W || ny < 0 || ny > WORLD_H || b.traveled > 1400) {
              bullets.splice(i, 1);
              continue;
            }
            b.x = nx; b.y = ny;

            // Hit detection — only the shooter's own client resolves eliminations
            if (b.shooterId === player.id) {
              let hit = false;
              for (const p of playersRef.current) {
                if (p.id === player.id) continue;
                if (p.role !== 'hider' || p.alive === false) continue;
                if (eliminatedRef.current.has(p.id)) continue;
                const ppx = p.id === player.id ? posRef.current.x : p.x;
                const ppy = p.id === player.id ? posRef.current.y : p.y;
                if (typeof ppx !== 'number' || typeof ppy !== 'number') continue;
                const d = Math.hypot(ppx - b.x, ppy - b.y);
                if (d < BULLET_HIT_RADIUS) {
                  eliminatedRef.current.add(p.id);
                  eliminate(p.id);
                  hit = true;
                  break;
                }
              }
              if (hit) {
                bullets.splice(i, 1);
              }
            }
          }

          render(ctx, canvas);
          rafRef.current = requestAnimationFrame(frame);
        };

        const render = (ctx, canvas) => {
          if (canvas.width === 0 || canvas.height === 0) return;
          const t = getTransform();
          if (!t) return;
          const { scale, offX, offY, viewW, viewH, camX, camY } = t;

          // Visible world-space bounds (with a small margin) for culling
          const vx0 = camX - viewW / 2 - 40, vx1 = camX + viewW / 2 + 40;
          const vy0 = camY - viewH / 2 - 40, vy1 = camY + viewH / 2 + 40;
          const inView = (x, y, pad = 40) => x > vx0 - pad && x < vx1 + pad && y > vy0 - pad && y < vy1 + pad;

          ctx.save();
          ctx.fillStyle = '#0a0a0f';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.translate(offX, offY);
          ctx.scale(scale, scale);

          // Floor base
          ctx.fillStyle = '#15151f';
          ctx.fillRect(vx0, vy0, vx1 - vx0, vy1 - vy0);

          // ── Per-room themed floors + wall decorations ──────────────────
          const roomThemes = [
            // Row 0
            { // (0,0) Living Room — warm amber parquet
              floor: 'rgba(180,120,50,0.10)', tile: 46, tileColor: 'rgba(160,100,30,0.07)',
              decor: (rx,ry) => {
                // rug in center
                ctx.save(); ctx.globalAlpha=0.18;
                ctx.fillStyle='#b45309';
                ctx.beginPath(); ctx.ellipse(rx+230, ry+230, 90, 60, 0, 0, Math.PI*2); ctx.fill();
                ctx.restore();
                // window top-right
                _drawWindow(ctx, rx+360, ry+20, 60, 40);
              }
            },
            { // (1,0) Office — cool gray carpet
              floor: 'rgba(100,116,139,0.09)', tile: 30, tileColor: 'rgba(100,116,139,0.05)',
              decor: (rx,ry) => {
                _drawWindow(ctx, rx+80, ry+20, 50, 36);
                _drawPoster(ctx, rx+360, ry+24, 40, 50, '#1d4ed8');
              }
            },
            { // (2,0) Kitchen — white tile
              floor: 'rgba(241,245,249,0.12)', tile: 38, tileColor: 'rgba(200,210,220,0.10)',
              decor: (rx,ry) => {
                _drawWindow(ctx, rx+120, ry+20, 55, 38);
                _drawWindow(ctx, rx+290, ry+20, 55, 38);
              }
            },
            { // (3,0) Bathroom — blue-white tile
              floor: 'rgba(186,230,253,0.10)', tile: 28, tileColor: 'rgba(125,211,252,0.08)',
              decor: (rx,ry) => {
                _drawWindow(ctx, rx+180, ry+20, 45, 32);
                _drawPoster(ctx, rx+340, ry+24, 32, 44, '#0891b2');
              }
            },
            // Row 1
            { // (0,1) Bedroom — soft purple carpet
              floor: 'rgba(167,139,250,0.09)', tile: 60, tileColor: 'rgba(139,92,246,0.04)',
              decor: (rx,ry) => {
                // bedside rug
                ctx.save(); ctx.globalAlpha=0.15;
                ctx.fillStyle='#7c3aed';
                ctx.beginPath(); ctx.ellipse(rx+175, ry+140, 70, 40, 0, 0, Math.PI*2); ctx.fill();
                ctx.restore();
                _drawWindow(ctx, rx+300, ry+20, 55, 38);
              }
            },
            { // (1,1) Server Room — dark grid
              floor: 'rgba(17,24,39,0.20)', tile: 40, tileColor: 'rgba(55,65,81,0.15)',
              decor: (rx,ry) => {
                // raised floor dots
                ctx.save(); ctx.globalAlpha=0.25; ctx.fillStyle='#4b5563';
                for (let dx=20; dx<440; dx+=40) for (let dy=20; dy<440; dy+=40) {
                  ctx.beginPath(); ctx.arc(rx+dx, ry+dy, 2, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
                _drawPoster(ctx, rx+24, ry+24, 44, 60, '#065f46');
              }
            },
            { // (2,1) Warehouse — concrete gray
              floor: 'rgba(107,114,128,0.12)', tile: 80, tileColor: 'rgba(75,85,99,0.08)',
              decor: (rx,ry) => {
                // hazard stripe on floor (bottom area)
                ctx.save(); ctx.globalAlpha=0.12;
                ctx.fillStyle='#f59e0b';
                for (let dx=0; dx<440; dx+=32) {
                  ctx.fillRect(rx+dx, ry+380, 16, 50);
                }
                ctx.restore();
                _drawPoster(ctx, rx+24, ry+24, 36, 50, '#92400e');
              }
            },
            { // (3,1) Locker Room — gray-green tile
              floor: 'rgba(52,211,153,0.07)', tile: 34, tileColor: 'rgba(16,185,129,0.06)',
              decor: (rx,ry) => {
                _drawWindow(ctx, rx+180, ry+20, 50, 34);
                _drawWindow(ctx, rx+330, ry+20, 50, 34);
              }
            },
            // Row 2
            { // (0,2) Library — warm wood
              floor: 'rgba(161,110,50,0.11)', tile: 52, tileColor: 'rgba(120,80,30,0.07)',
              decor: (rx,ry) => {
                _drawWindow(ctx, rx+300, ry+20, 60, 42);
                _drawPoster(ctx, rx+24, ry+24, 36, 54, '#92400e');
                _drawPoster(ctx, rx+24, ry+90, 36, 54, '#1e40af');
              }
            },
            { // (1,2) Break Room — warm tile
              floor: 'rgba(254,215,170,0.10)', tile: 42, tileColor: 'rgba(253,186,116,0.07)',
              decor: (rx,ry) => {
                _drawWindow(ctx, rx+80, ry+20, 55, 38);
                _drawWindow(ctx, rx+310, ry+20, 55, 38);
                // plant pot ring on floor
                ctx.save(); ctx.globalAlpha=0.10;
                ctx.fillStyle='#a3e635';
                ctx.beginPath(); ctx.arc(rx+400, ry+400, 30, 0, Math.PI*2); ctx.fill();
                ctx.restore();
              }
            },
            { // (2,2) Workshop — concrete + orange
              floor: 'rgba(154,108,60,0.12)', tile: 70, tileColor: 'rgba(120,80,40,0.08)',
              decor: (rx,ry) => {
                // oil stains
                ctx.save(); ctx.globalAlpha=0.10; ctx.fillStyle='#374151';
                ctx.beginPath(); ctx.ellipse(rx+140, ry+310, 30, 18, 0.4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(rx+300, ry+180, 22, 14, -0.3, 0, Math.PI*2); ctx.fill();
                ctx.restore();
                _drawPoster(ctx, rx+24, ry+24, 40, 56, '#b45309');
              }
            },
            { // (3,2) Lobby — marble-white
              floor: 'rgba(241,245,249,0.14)', tile: 55, tileColor: 'rgba(203,213,225,0.09)',
              decor: (rx,ry) => {
                // marble veins
                ctx.save(); ctx.globalAlpha=0.07; ctx.strokeStyle='#94a3b8'; ctx.lineWidth=1;
                ctx.beginPath(); ctx.moveTo(rx+50,ry+80); ctx.bezierCurveTo(rx+120,ry+160,rx+200,ry+100,rx+310,ry+200); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(rx+200,ry+50); ctx.bezierCurveTo(rx+280,ry+130,rx+350,ry+90,rx+420,ry+180); ctx.stroke();
                ctx.restore();
                _drawWindow(ctx, rx+80, ry+20, 60, 44);
                _drawWindow(ctx, rx+310, ry+20, 60, 44);
              }
            },
          ];

          // helper: draw a wall window decoration
          function _drawWindow(ctx, x, y, w, h) {
            ctx.save(); ctx.globalAlpha=0.28;
            ctx.fillStyle='#bae6fd';
            ctx.beginPath(); ctx.roundRect(x, y, w, h, 2); ctx.fill();
            ctx.strokeStyle='#94a3b8'; ctx.lineWidth=1; ctx.stroke();
            // cross frame
            ctx.strokeStyle='#7dd3fc'; ctx.lineWidth=0.5;
            ctx.beginPath(); ctx.moveTo(x+w/2,y); ctx.lineTo(x+w/2,y+h); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x,y+h/2); ctx.lineTo(x+w,y+h/2); ctx.stroke();
            ctx.restore();
          }
          // helper: draw a wall poster/painting
          function _drawPoster(ctx, x, y, w, h, color) {
            ctx.save(); ctx.globalAlpha=0.30;
            ctx.fillStyle=color;
            ctx.beginPath(); ctx.roundRect(x, y, w, h, 2); ctx.fill();
            ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1; ctx.stroke();
            // inner design
            ctx.globalAlpha=0.15; ctx.fillStyle='#fff';
            ctx.beginPath(); ctx.roundRect(x+4, y+4, w-8, h/2-4, 1); ctx.fill();
            ctx.restore();
          }

          for (let row = 0; row < GRID_ROWS; row++) {
            for (let col = 0; col < GRID_COLS; col++) {
              const rx = col * ROOM_SIZE, ry = row * ROOM_SIZE;
              if (!inView(rx + ROOM_SIZE / 2, ry + ROOM_SIZE / 2, ROOM_SIZE)) continue;
              const theme = roomThemes[row * GRID_COLS + col];
              // base floor tint
              ctx.fillStyle = theme.floor;
              ctx.fillRect(rx, ry, ROOM_SIZE, ROOM_SIZE);
              // tile grid overlay
              ctx.strokeStyle = theme.tileColor;
              ctx.lineWidth = 0.8;
              const ts = theme.tile;
              for (let tx = rx; tx < rx + ROOM_SIZE; tx += ts) {
                ctx.beginPath(); ctx.moveTo(tx, ry); ctx.lineTo(tx, ry + ROOM_SIZE); ctx.stroke();
              }
              for (let ty = ry; ty < ry + ROOM_SIZE; ty += ts) {
                ctx.beginPath(); ctx.moveTo(rx, ty); ctx.lineTo(rx + ROOM_SIZE, ty); ctx.stroke();
              }
              // wall decorations
              theme.decor(rx, ry);
            }
          }



          // Walls — top-down blocks with depth shading and amber edge glow
          for (const w of WALLS) {
            if (!inView(w.x + w.w / 2, w.y + w.h / 2, Math.max(w.w, w.h))) continue;
            // drop shadow
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            ctx.fillRect(w.x + 3, w.y + 3, w.w, w.h);

            const wallGrad = ctx.createLinearGradient(w.x, w.y, w.x, w.y + w.h);
            wallGrad.addColorStop(0, '#4b4b5c');
            wallGrad.addColorStop(1, '#34343f');
            ctx.fillStyle = wallGrad;
            ctx.fillRect(w.x, w.y, w.w, w.h);

            // top highlight edge
            ctx.fillStyle = 'rgba(255,255,255,0.08)';
            ctx.fillRect(w.x, w.y, w.w, Math.min(2, w.h));

            // amber outline
            ctx.strokeStyle = 'rgba(245,158,11,0.22)';
            ctx.lineWidth = 1;
            ctx.strokeRect(w.x + 0.5, w.y + 0.5, w.w - 1, w.h - 1);
          }

          // Props (highlight ones the local hider can interact with)
          const canInteract = myRole === 'hider' && myAlive !== false && !disguiseRef.current;
          for (const prop of PROPS) {
            if (!inView(prop.x, prop.y, 60)) continue;
            drawProp(ctx, prop.x, prop.y, prop.type);
            if (canInteract) {
              const d = Math.hypot(prop.x - posRef.current.x, prop.y - posRef.current.y);
              if (d <= DISGUISE_RANGE) {
                ctx.beginPath();
                ctx.arc(prop.x, prop.y, PROP_RADIUS + 4, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(34,211,238,0.7)';
                ctx.lineWidth = 2;
                ctx.setLineDash([4, 3]);
                ctx.stroke();
                ctx.setLineDash([]);
              }
            }
          }

          // Players
          const players = playersRef.current;
          for (const p of players) {
            const isMe = p.id === player.id;
            let px, py, facing, walking, walkPhase, disguise;

            if (isMe) {
              px = posRef.current.x; py = posRef.current.y;
              facing = facingRef.current;
              walking = (keysRef.current.up || keysRef.current.down || keysRef.current.left || keysRef.current.right || joyRef.current.active) && myAlive !== false;
              walkPhase = walkPhaseRef.current;
              disguise = disguiseRef.current;
            } else {
              if (typeof p.x !== 'number' || typeof p.y !== 'number') continue;
              px = p.x; py = p.y;
              facing = 1;
              walking = false;
              walkPhase = 0;
              disguise = p.disguise || null;
            }

            if (!isMe && !inView(px, py, 60)) continue;

            const isDead = p.alive === false;
            const color = isDead ? '#9ca3af'
              : p.role === 'hunter' ? '#f87171'
              : '#22d3ee';
            const alpha = isDead ? 0.35 : 1;

            if (disguise && !isDead) {
              // Render as the disguised prop instead of a character.
              drawProp(ctx, px, py, disguise, alpha);
              // subtle highlight ring for "me" so I can find myself
              if (isMe) {
                ctx.beginPath();
                ctx.arc(px, py, PROP_RADIUS + 6, 0, Math.PI * 2);
                ctx.strokeStyle = '#f59e0b';
                ctx.lineWidth = 2;
                ctx.stroke();
              }
            } else {
              drawCharacter(ctx, px, py, color, { facing, walking, walkPhase, alpha, highlight: isMe });
            }

            // name label
            ctx.globalAlpha = isDead ? 0.5 : 1;
            ctx.fillStyle = '#e2e8f0';
            ctx.font = '11px "JetBrains Mono", monospace';
            ctx.textAlign = 'center';
            ctx.fillText(p.name, px, py - PLAYER_RADIUS - 10);
            ctx.globalAlpha = 1;
          }

          // Bullets — glowing tracer with trail
          for (const b of bulletsRef.current) {
            if (!inView(b.x, b.y, 30)) continue;
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(b.x, b.y);
            ctx.lineTo(b.x - b.dx * 14, b.y - b.dy * 14);
            ctx.strokeStyle = 'rgba(253,224,71,0.4)';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#fde047';
            ctx.shadowColor = 'rgba(253,224,71,0.9)';
            ctx.shadowBlur = 8;
            ctx.fill();
            ctx.restore();
          }

          // Aim line for hunter (me)
          if (myRole === 'hunter' && phase === 'hunting' && myAlive !== false) {
            const a = aimRef.current;
            const dx = a.x - posRef.current.x, dy = a.y - posRef.current.y;
            const len = Math.hypot(dx, dy) || 1;
            const ndx = dx / len, ndy = dy / len;
            ctx.beginPath();
            ctx.moveTo(posRef.current.x + ndx * (PLAYER_RADIUS + 4), posRef.current.y + ndy * (PLAYER_RADIUS + 4));
            ctx.lineTo(posRef.current.x + ndx * (PLAYER_RADIUS + 40), posRef.current.y + ndy * (PLAYER_RADIUS + 40));
            ctx.strokeStyle = 'rgba(248,113,113,0.6)';
            ctx.lineWidth = 2;
            ctx.stroke();
          }

          // Subtle vignette overlay (screen space) to focus attention toward center
          ctx.restore();
          const vignette = ctx.createRadialGradient(
            canvas.width / 2, canvas.height / 2, Math.min(canvas.width, canvas.height) * 0.25,
            canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) * 0.75
          );
          vignette.addColorStop(0, 'rgba(0,0,0,0)');
          vignette.addColorStop(1, 'rgba(0,0,0,0.4)');
          ctx.fillStyle = vignette;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // ── Minimap (top-right) ─────────────────────────────────────────────
          const mmW = Math.min(140, canvas.width * 0.22);
          const mmH = mmW * (WORLD_H / WORLD_W);
          const mmX = canvas.width - mmW - 12;
          const mmY = 12;
          const mmScale = mmW / WORLD_W;

          ctx.save();
          ctx.fillStyle = 'rgba(10,10,15,0.7)';
          ctx.fillRect(mmX, mmY, mmW, mmH);
          ctx.strokeStyle = 'rgba(245,158,11,0.4)';
          ctx.lineWidth = 1;
          ctx.strokeRect(mmX, mmY, mmW, mmH);

          // Room grid
          ctx.strokeStyle = 'rgba(255,255,255,0.12)';
          for (let c = 1; c < GRID_COLS; c++) {
            const x = mmX + c * ROOM_SIZE * mmScale;
            ctx.beginPath(); ctx.moveTo(x, mmY); ctx.lineTo(x, mmY + mmH); ctx.stroke();
          }
          for (let r = 1; r < GRID_ROWS; r++) {
            const y = mmY + r * ROOM_SIZE * mmScale;
            ctx.beginPath(); ctx.moveTo(mmX, y); ctx.lineTo(mmX + mmW, y); ctx.stroke();
          }

          // Players on minimap
          for (const p of players) {
            const isMe = p.id === player.id;
            const px = isMe ? posRef.current.x : p.x;
            const py = isMe ? posRef.current.y : p.y;
            if (typeof px !== 'number' || typeof py !== 'number') continue;
            // Only show hunters their own dot; hiders see everyone (their team) —
            // simplest: show "me" always, and same-role teammates.
            if (!isMe && p.role !== myRole) continue;
            if (p.alive === false && !isMe) continue;
            const dotX = mmX + px * mmScale;
            const dotY = mmY + py * mmScale;
            ctx.beginPath();
            ctx.arc(dotX, dotY, isMe ? 3 : 2, 0, Math.PI * 2);
            ctx.fillStyle = isMe ? '#f59e0b' : (p.role === 'hunter' ? '#f87171' : '#22d3ee');
            ctx.fill();
          }

          // Camera viewport indicator
          const vpX = mmX + (camX - viewW / 2) * mmScale;
          const vpY = mmY + (camY - viewH / 2) * mmScale;
          const vpW = viewW * mmScale;
          const vpH = viewH * mmScale;
          ctx.strokeStyle = 'rgba(255,255,255,0.5)';
          ctx.lineWidth = 1;
          ctx.strokeRect(vpX, vpY, vpW, vpH);
          ctx.restore();
        };


        rafRef.current = requestAnimationFrame(frame);
        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          lastTsRef.current = null;
        };
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [myAlive, phase, myRole, player.id, updatePosition, eliminate]);

      // ── Touch joystick handlers ──────────────────────────────────────────────
      const joyBaseRef = useRef(null);
      const onJoyStart = (e) => {
        e.preventDefault();
        joyRef.current.active = true;
        updateJoy(e);
      };
      const onJoyMove = (e) => {
        if (!joyRef.current.active) return;
        e.preventDefault();
        updateJoy(e);
      };
      const onJoyEnd = (e) => {
        e.preventDefault();
        joyRef.current = { active: false, dx: 0, dy: 0 };
        setJoyKnob({ x: 0, y: 0 });
      };
      const [joyKnob, setJoyKnob] = useState({ x: 0, y: 0 });
      const updateJoy = (e) => {
        const base = joyBaseRef.current;
        if (!base) return;
        const rect = base.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const touch = e.touches ? e.touches[0] : e;
        let dx = touch.clientX - cx;
        let dy = touch.clientY - cy;
        const maxR = rect.width / 2;
        const dist = Math.hypot(dx, dy);
        if (dist > maxR) {
          dx = (dx / dist) * maxR;
          dy = (dy / dist) * maxR;
        }
        joyRef.current.dx = dx / maxR;
        joyRef.current.dy = dy / maxR;
        setJoyKnob({ x: dx, y: dy });
      };

      const ammoPct = Math.round((ammoDisplay / MAX_AMMO) * 100);

      return (
        <div ref={wrapRef} className="relative h-64 md:h-96 bg-black border border-white/10 overflow-hidden" style={{ touchAction: 'none' }}>
          <canvas
            ref={canvasRef} className="absolute inset-0 w-full h-full"
            onPointerMove={onCanvasPointerMove}
            onPointerDown={onCanvasPointerDown}
          />

          {/* Legend */}
          <div className="absolute top-2 left-2 flex items-center gap-3 px-2 py-1 bg-black/60 border border-white/10 font-['JetBrains_Mono'] text-[10px] text-gray-300">
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-cyan-400 inline-block"></span>Hider</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-red-400 inline-block"></span>Hunter</span>
          </div>

          {/* Ammo HUD (hunters, hunting phase) */}
          {myRole === 'hunter' && phase === 'hunting' && myAlive !== false && (
            <div className="absolute top-2 right-2 px-2 py-1 bg-black/60 border border-white/10 font-['JetBrains_Mono'] text-[10px] text-gray-300">
              <div className="flex items-center justify-between gap-2 mb-1">
                <span>AMMO</span><span className="text-amber-400">{ammoDisplay}/{MAX_AMMO}</span>
              </div>
              <div className="h-1.5 w-20 bg-white/10 rounded-sm overflow-hidden">
                <div className="h-full bg-amber-500 transition-all" style={{ width: `${ammoPct}%` }} />
              </div>
            </div>
          )}

          {/* Disguise indicator (hiders) */}
          {myRole === 'hider' && myAlive !== false && (
            <div className="absolute top-2 right-2 px-2 py-1 bg-black/60 border border-white/10 font-['JetBrains_Mono'] text-[10px] text-gray-300">
              {disguiseDisplay ? `DISGUISED: ${disguiseDisplay.toUpperCase()} (click to revert)` : 'Click a glowing prop to disguise'}
            </div>
          )}

          {/* On-screen joystick (touch) */}
          {myAlive !== false && (
            <div
              ref={joyBaseRef}
              onPointerDown={onJoyStart} onPointerMove={onJoyMove}
              onPointerUp={onJoyEnd} onPointerCancel={onJoyEnd} onPointerLeave={onJoyEnd}
              className="absolute bottom-4 left-4 w-24 h-24 rounded-full bg-white/5 border border-white/15"
              style={{ touchAction: 'none' }}
            >
              <div
                className="absolute w-10 h-10 rounded-full bg-amber-500/70 border border-amber-400"
                style={{
                  left: `calc(50% + ${joyKnob.x}px - 20px)`,
                  top: `calc(50% + ${joyKnob.y}px - 20px)`,
                  transition: joyRef.current.active ? 'none' : 'left 0.15s, top 0.15s',
                }}
              />
            </div>
          )}

          {myAlive === false && (
            <div className="absolute inset-0 flex items-center justify-center bg-black/60">
              <div className="font-['Chakra_Petch'] text-lg font-bold text-red-400 uppercase tracking-widest">Eliminated — Spectating</div>
            </div>
          )}
        </div>
      );
    }

    // ─── Chat Box ─────────────────────────────────────────────────────────────
    function ChatBox({ messages, input, setInput, onSend, chatRef }) {
      return (
        <div className="bg-black/40 border border-white/10 p-4">
          <h3 className="font-['JetBrains_Mono'] text-xs text-gray-400 uppercase mb-3">Mission Chat</h3>
          <div ref={chatRef} className="h-40 overflow-y-auto space-y-1 mb-3">
            {messages.length === 0 && (
              <p className="font-['JetBrains_Mono'] text-xs text-gray-600">No messages yet...</p>
            )}
            {messages.map((m, i) => (
              <div key={i} className="font-['JetBrains_Mono'] text-xs">
                <span className="text-amber-500">{m.from}: </span>
                <span className="text-gray-300">{m.text}</span>
              </div>
            ))}
          </div>
          <div className="flex gap-2">
            <input
              type="text" value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && onSend()}
              placeholder="Type a message..."
              className="flex-1 bg-black/50 border border-white/10 focus:border-amber-500/50 focus:outline-none px-3 py-2 font-['JetBrains_Mono'] text-xs text-white placeholder-gray-700 transition-colors"
            />
            <button onClick={onSend} className="px-4 py-2 bg-amber-600 hover:bg-amber-500 text-black font-['JetBrains_Mono'] text-xs font-bold transition-colors">
              SEND
            </button>
          </div>
        </div>
      );
    }

    // ─── Shared components ────────────────────────────────────────────────────
    function NavButton({ active, onClick, icon, children }) {
      return (
        <button onClick={onClick}
          className={`w-full flex items-center gap-3 px-4 py-3 font-['JetBrains_Mono'] text-sm uppercase tracking-wider transition-all duration-200 border-l-2 ${
            active ? 'bg-amber-500/10 border-amber-500 text-amber-500 shadow-[inset_10px_0_20px_-10px_rgba(245,158,11,0.2)]'
                   : 'border-transparent text-gray-400 hover:text-white hover:bg-white/5'}`}>
          {icon}<span>{children}</span>
        </button>
      );
    }

    function StatBox({ label, value, color }) {
      return (
        <div className="bg-black/30 border border-white/5 p-3">
          <div className="font-['JetBrains_Mono'] text-[10px] text-gray-500 uppercase tracking-wider mb-1">{label}</div>
          <div className={`font-['Chakra_Petch'] text-xl font-bold ${color}`}>{value}</div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PropHuntLobby />);
  </script>
</body>
</html>
