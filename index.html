    function genRoomCode() {

      return code;

    // ─── 2D Game World ──────────────────────────────────────────────────────────
    // World is a fixed coordinate space (units), rendered via <canvas> with a
    // camera that follows the local player (zoomed in — the whole map is never
    // visible at once). Layout: a 4x3 grid of rooms connected by doorway gaps.
    const GRID_COLS = 4;
    const GRID_ROWS = 3;
    const ROOM_SIZE = 460; // each room is ROOM_SIZE x ROOM_SIZE units
    const WORLD_W = GRID_COLS * ROOM_SIZE;
    const WORLD_H = GRID_ROWS * ROOM_SIZE;
    const PLAYER_RADIUS = 14;
    const MOVE_SPEED = 220; // units per second

    // Camera: how much world-space is visible vertically. Horizontal extent is
    // derived from the canvas aspect ratio. Smaller = more zoomed in.
    const CAMERA_VIEW_H = 620;

    // Outer border + interior cross-walls forming an NxM grid of rooms with
    // doorway gaps centered on each shared wall segment.
    const WALL_THICKNESS = 14;
    const DOOR_GAP = 100;

    function buildWalls() {
      const walls = [];
      const w = WORLD_W, h = WORLD_H, t = WALL_THICKNESS;

      // Outer border (4 walls)
      walls.push({ x: 0, y: 0, w: w, h: t });               // top
      walls.push({ x: 0, y: h - t, w: w, h: t });           // bottom
      walls.push({ x: 0, y: 0, w: t, h: h });               // left
      walls.push({ x: w - t, y: 0, w: t, h: h });           // right

      const colW = w / GRID_COLS;
      const rowH = h / GRID_ROWS;

      // Vertical divider walls between columns, one segment per row with a
      // doorway gap centered on that row.
      for (let c = 1; c < GRID_COLS; c++) {
        const vx = c * colW;
        for (let r = 0; r < GRID_ROWS; r++) {
          const rowTop = r * rowH;
          const gapStart = rowTop + rowH / 2 - DOOR_GAP / 2;
          const gapEnd = gapStart + DOOR_GAP;
          if (gapStart > rowTop) {
            walls.push({ x: vx - t / 2, y: rowTop, w: t, h: gapStart - rowTop });
          }
          if (rowTop + rowH > gapEnd) {
            walls.push({ x: vx - t / 2, y: gapEnd, w: t, h: (rowTop + rowH) - gapEnd });
          }
        }
      }

      // Horizontal divider walls between rows, one segment per column with a
      // doorway gap centered on that column.
      for (let r = 1; r < GRID_ROWS; r++) {
        const hy = r * rowH;
        for (let c = 0; c < GRID_COLS; c++) {
          const colLeft = c * colW;
          const gapStart = colLeft + colW / 2 - DOOR_GAP / 2;
          const gapEnd = gapStart + DOOR_GAP;
          if (gapStart > colLeft) {
            walls.push({ x: colLeft, y: hy - t / 2, w: gapStart - colLeft, h: t });
          }
          if (colLeft + colW > gapEnd) {
            walls.push({ x: gapEnd, y: hy - t / 2, w: (colLeft + colW) - gapEnd, h: t });
          }
        }
      }

      return walls;
    }

      { x: 70, y: WORLD_H - 70 },
      { x: WORLD_W - 70, y: WORLD_H - 70 },
      { x: WORLD_W / 2, y: WORLD_H - 70 },

      { x: 70, y: WORLD_H / 2 },
      { x: WORLD_W / 2, y: WORLD_H / 2 },
      { x: WORLD_W * 0.25, y: WORLD_H * 0.75 },

    function spawnFor(role, index) {
      if (role === 'hunter') {

        const angle = (index % 8) * (Math.PI / 4);
        return {
          x: HUNTER_SPAWN.x + Math.cos(angle) * 24,
          y: HUNTER_SPAWN.y + Math.sin(angle) * 24,
        };
      }
      const spawn = HIDER_SPAWNS[index % HIDER_SPAWNS.length];
      return { x: spawn.x, y: spawn.y };
    }

    // Axis-aligned circle-vs-rectangle collision check, with sliding:
    // attempts to move along each axis independently so players slide
    // along walls instead of getting stuck.
    function resolveMove(px, py, dx, dy, walls, radius) {
      let nx = px + dx;
      let ny = py;
      if (collides(nx, ny, walls, radius)) nx = px;

      ny = py + dy;
      if (collides(nx, ny, walls, radius)) ny = py;

      // Clamp to world bounds
      nx = Math.max(radius, Math.min(WORLD_W - radius, nx));
      ny = Math.max(radius, Math.min(WORLD_H - radius, ny));
      return { x: nx, y: ny };
    }

    function collides(cx, cy, walls, radius) {
      for (const wl of walls) {
        const closestX = Math.max(wl.x, Math.min(cx, wl.x + wl.w));
        const closestY = Math.max(wl.y, Math.min(cy, wl.y + wl.h));
        const dx = cx - closestX;
        const dy = cy - closestY;
        if (dx * dx + dy * dy < radius * radius) return true;
      }
      return false;
    }

      { id: 'bookcase_02c',  type: 'bookcase', ...roomPos(0, 2,   60, -155) }, // top wall
      { id: 'lamp_02',       type: 'lamp',     ...roomPos(0, 2,  155, -155) }, // top-right
      { id: 'chair_02a',     type: 'chair',    ...roomPos(0, 2,   80,   40) }, // center area
      { id: 'chair_02b',     type: 'chair',    ...roomPos(0, 2,  100,  100) },
      { id: 'plant_02',      type: 'plant',    ...roomPos(0, 2, -155,  155) }, // bottom-left
      { id: 'shelf_02',      type: 'shelf',    ...roomPos(0, 2,  155,   80) }, // right wall

      // ── Room (1,2): BREAK ROOM ──────────────────────────────────────
      { id: 'coffee_12',     type: 'coffee_machine', ...roomPos(1, 2, -155, -155) }, // top-left
      { id: 'vending_12',    type: 'vending',        ...roomPos(1, 2,  155, -155) }, // top-right
      { id: 'table_12',      type: 'counter',        ...roomPos(1, 2,  -20,  -20) }, // center table
      { id: 'chair_12a',     type: 'chair',          ...roomPos(1, 2,  -20,   60) }, // around table
      { id: 'chair_12b',     type: 'chair',          ...roomPos(1, 2,   80,  -20) },
      { id: 'trash_12',      type: 'trash',          ...roomPos(1, 2, -155,  155) }, // bottom-left
      { id: 'plant_12',      type: 'plant',          ...roomPos(1, 2,  155,  155) }, // bottom-right

      // ── Room (2,2): WORKSHOP ────────────────────────────────────────
      { id: 'workbench_22a', type: 'workbench', ...roomPos(2, 2, -155, -100) }, // left wall
      { id: 'workbench_22b', type: 'workbench', ...roomPos(2, 2,   40, -155) }, // top wall
      { id: 'barrel_22a',    type: 'barrel',    ...roomPos(2, 2,  155,  -80) }, // right wall
      { id: 'barrel_22b',    type: 'barrel',    ...roomPos(2, 2,  155,   60) },
      { id: 'crate_22',      type: 'crate',     ...roomPos(2, 2, -155,  155) }, // bottom-left
      { id: 'shelf_22',      type: 'shelf',     ...roomPos(2, 2,  155,  155) }, // bottom-right
      { id: 'trash_22',      type: 'trash',     ...roomPos(2, 2, -155,  -155) }, // top-left

      // ── Room (3,2): LOBBY / RECEPTION ───────────────────────────────
      { id: 'reception_32',  type: 'reception_desk', ...roomPos(3, 2,  -20, -155) }, // top-center
      { id: 'sofa_32a',      type: 'sofa',           ...roomPos(3, 2, -155,   40) }, // left wall
      { id: 'sofa_32b',      type: 'sofa',           ...roomPos(3, 2,  155,   40) }, // right wall
      { id: 'plant_32a',     type: 'plant',          ...roomPos(3, 2, -155, -155) }, // top-left
      { id: 'plant_32b',     type: 'plant',          ...roomPos(3, 2,  155, -155) }, // top-right
      { id: 'lamp_32',       type: 'lamp',           ...roomPos(3, 2,  -80,  155) }, // bottom
      { id: 'tv_32',         type: 'tv',             ...roomPos(3, 2, -155,  -60) }, // left wall screen
    ];

    const DISGUISE_RANGE = 50;     // how close a hider must be to click-disguise a prop
    const DISGUISE_MOVE_MULT = 0.4; // disguised hiders move at 40% speed

    // ─── Hunter weapon ──────────────────────────────────────────────────────────
    const MAX_AMMO = 6;
    const AMMO_REGEN_MS = 4000; // one bullet regenerates every 4s
    const BULLET_SPEED = 600;   // units per second
    const BULLET_HIT_RADIUS = 16;

    // ─── Main App ───────────────────────────────────────────────────────────────
    function PropHuntLobby() {
      const [activeTab, setActiveTab]   = useState('play');
      const [conn, setConn]             = useState('connecting'); // connecting | online | offline
      const [player, setPlayer]         = useState({
        id: null, name: 'Connecting...', level: 1,
        xp: 0, xpToNext: LEVEL_XP, wins: 0, losses: 0,
      });
      const [room, setRoom]             = useState(null);
      const [phase, setPhase]           = useState('lobby'); // lobby|queue|hiding|hunting|ended
      const [winner, setWinner]         = useState(null);
      const [queuePos, setQueuePos]     = useState(0);
      const [queueCount, setQueueCount] = useState(0);
      const [notification, setNotif]    = useState(null);
      const [chatMessages, setChatMsgs] = useState([]);
      const [chatInput, setChatInput]   = useState('');
      const [roomCodeInput, setRoomCodeInput] = useState('');
      const [xpPopup, setXpPopup]       = useState(null);
      const [roomSettings, setRoomSettings] = useState({
        map: 'Office Complex', timeLimit: 180, maxPlayers: 8
      });
      const [countdown, setCountdown]   = useState(null);

      const uidRef        = useRef(null);
      const roomCodeRef   = useRef(null);
      const chatRef       = useRef(null);
      const roomRef       = useRef(null);   // current room DB ref (for listeners/cleanup)
      const queueRef      = useRef(null);   // queue DB ref
      const handledEndRef = useRef(false);  // guards GAME_ENDED stats write
      const lastRoomRef   = useRef(null);   // last room snapshot for diffing join/leave

      // ── Notification helper ─────────────────────────────────────────────────
      const notify = useCallback((msg, color = 'amber') => {
        setNotif({ msg, color });
        setTimeout(() => setNotif(null), 3500);
      }, []);

      // ── Auth + player profile ────────────────────────────────────────────────
      useEffect(() => {
        const unsub = auth.onAuthStateChanged(user => {
          if (user) {
            uidRef.current = user.uid;
            initPlayer(user.uid);
          }
        });

        auth.signInAnonymously().catch(err => {
          console.error('Auth error:', err);
          setConn('offline');
          notify(`Auth failed: ${err.code || err.message || 'unknown error'}`, 'red');
        });

        return () => unsub();
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);

      async function initPlayer(uid) {
        const ref = db.ref(`players/${uid}`);
        const snap = await ref.get();
        let data;
        if (!snap.exists()) {
          data = {
            name: randomName(), level: 1, xp: 0,
            wins: 0, losses: 0, createdAt: firebase.database.ServerValue.TIMESTAMP,
          };
          await ref.set(data);
        } else {
          data = snap.val();
        }

        setPlayer(p => ({
          ...p, id: uid,
          name: data.name || randomName(),
          level: data.level || 1,
          xp: data.xp || 0,
          xpToNext: (data.level || 1) * LEVEL_XP,
          wins: data.wins || 0,
          losses: data.losses || 0,
        }));
        setConn('online');

        // Live-sync player profile (in case stats change e.g. from another tab)
        ref.on('value', s => {
          const d = s.val();
          if (!d) return;
          setPlayer(p => ({
            ...p,
            name: d.name || p.name,
            level: d.level || 1,
            xp: d.xp || 0,
            xpToNext: (d.level || 1) * LEVEL_XP,
            wins: d.wins || 0,
            losses: d.losses || 0,
          }));
        });
      }

      // ── Connection state monitoring ─────────────────────────────────────────
      useEffect(() => {
        const connectedRef = db.ref('.info/connected');
        const cb = (snap) => {
          if (snap.val() === true) {
            setConn('online');
          } else {
            setConn('offline');
          }
        };
        connectedRef.on('value', cb);
        return () => connectedRef.off('value', cb);
      }, []);

      // Auto-scroll chat
      useEffect(() => {
        if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
      }, [chatMessages]);

      // Countdown timer for hiding phase
      useEffect(() => {
        if (phase === 'hiding' && room?.hideEndsAt) {
          const tick = () => {
            const remaining = Math.ceil((room.hideEndsAt - Date.now()) / 1000);
            setCountdown(Math.max(0, remaining));
          };
          tick();
          const iv = setInterval(tick, 1000);
          return () => clearInterval(iv);
        } else if (phase !== 'hiding') {
          setCountdown(null);
        }
      }, [phase, room?.hideEndsAt]);

      // The in-game overlay (GameView) only renders under the Play tab.
      // If a game starts/continues while the user is on a different tab
      // (e.g. a private room created from the Custom tab), jump them to
      // Play so the countdown / hunting / results screen is visible.
      useEffect(() => {
        if (room && (phase === 'hiding' || phase === 'hunting' || phase === 'ended') && activeTab !== 'play') {
          setActiveTab('play');
        }
      }, [room, phase, activeTab]);

      // ── Host-side phase transition watchers ─────────────────────────────────
      // Hiding → Hunting, once the timer expires (any client can do this safely
      // via transaction, but we let only the host attempt it to avoid spam).
      useEffect(() => {
        if (!room || phase !== 'hiding' || !room.hideEndsAt) return;
        const isHost = room.hostId === player.id;
        if (!isHost) return;

        const remaining = room.hideEndsAt - Date.now();
        if (remaining <= 0) {
          transitionToHunting();
          return;
        }
        const t = setTimeout(transitionToHunting, remaining + 50);
        return () => clearTimeout(t);
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [room?.hideEndsAt, phase, room?.hostId, player.id]);

      async function transitionToHunting() {
        const code = roomCodeRef.current;
        if (!code) return;
        const ref = db.ref(`rooms/${code}`);
        await ref.transaction(r => {
          if (!r) return r;
          if (r.phase !== 'hiding') return r; // already transitioned
          r.phase = 'hunting';
          r.huntEndsAt = Date.now() + (r.timeLimit || 180) * 1000;
          return r;
        });
      }

      // Hunting → Ended, when timer expires (hiders win) — host-driven.
      useEffect(() => {
        if (!room || phase !== 'hunting' || !room.huntEndsAt) return;
        const isHost = room.hostId === player.id;
        if (!isHost) return;

        const remaining = room.huntEndsAt - Date.now();
        if (remaining <= 0) {
          endGame('hiders');
          return;
        }
        const t = setTimeout(() => endGame('hiders'), remaining + 50);
        return () => clearTimeout(t);
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [room?.huntEndsAt, phase, room?.hostId, player.id]);

      // Check win condition whenever players change (all hiders eliminated → hunters win)
      useEffect(() => {
        if (!room || phase !== 'hunting') return;
        const isHost = room.hostId === player.id;
        if (!isHost) return;

        const playersArr = room.players || [];
        const hiders = playersArr.filter(p => p.role === 'hider');
        if (hiders.length > 0 && hiders.every(p => p.alive === false)) {
          endGame('hunters');
        }
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [room?.players, phase, room?.hostId, player.id]);

      async function endGame(winnerSide) {
        const code = roomCodeRef.current;
        if (!code) return;
        const ref = db.ref(`rooms/${code}`);
        await ref.transaction(r => {
          if (!r) return r;
          if (r.phase === 'ended') return r;
          r.phase = 'ended';
          r.winner = winnerSide;
          return r;
        });
      }

      // ── Award XP / stats once game ends (each client updates own record) ────
      useEffect(() => {
        if (phase !== 'ended' || !room || handledEndRef.current) return;
        handledEndRef.current = true;

        const me = (room.players || []).find(p => p.id === player.id);
        if (!me) return;
        const won = (room.winner === 'hunters' && me.role === 'hunter')
                 || (room.winner === 'hiders'  && me.role === 'hider');

        const xpGained = won ? 250 : 75;

        const ref = db.ref(`players/${player.id}`);
        ref.transaction(p => {
          if (!p) p = { name: player.name, level: 1, xp: 0, wins: 0, losses: 0 };
          p.xp = (p.xp || 0) + xpGained;
          p.level = p.level || 1;
          while (p.xp >= p.level * LEVEL_XP) {
            p.xp -= p.level * LEVEL_XP;
            p.level += 1;
          }
          if (won) p.wins = (p.wins || 0) + 1;
          else p.losses = (p.losses || 0) + 1;
          return p;
        });

        setXpPopup({ xpGained, won });
        setTimeout(() => setXpPopup(null), 4000);
      }, [phase, room, player.id, player.name]);

      // Reset the "handled end" guard whenever we leave the ended phase / room
      useEffect(() => {
        if (phase !== 'ended') handledEndRef.current = false;
      }, [phase]);

      // ── Room subscription ───────────────────────────────────────────────────
      function subscribeToRoom(code) {
        unsubscribeFromRoom();
        roomCodeRef.current = code;
        const ref = db.ref(`rooms/${code}`);
        roomRef.current = ref;

        ref.on('value', snap => {
          const data = snap.val();
          if (!data) {
            // room was deleted (e.g. host left / emptied)
            notify('Room closed', 'red');
            leaveRoomCleanup();
            return;
          }

          const players = data.players || {};
          const playersArr = Object.values(players).sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0));
          const newRoom = { ...data, code, players: playersArr };

          // Detect join/leave/phase changes for notifications
          const prev = lastRoomRef.current;
          if (prev) {
            const prevIds = new Set((prev.players || []).map(p => p.id));
            const newIds  = new Set(playersArr.map(p => p.id));

            for (const p of playersArr) {
              if (!prevIds.has(p.id) && p.id !== player.id) {
                notify(`${p.name} joined`, 'cyan');
              }
            }
            for (const p of (prev.players || [])) {
              if (!newIds.has(p.id) && p.id !== player.id) {
                notify('A player left the room', 'red');
              }
            }

            if (prev.phase !== newRoom.phase) {
              if (newRoom.phase === 'hiding') notify('Game started! HIDE NOW!', 'amber');
              if (newRoom.phase === 'hunting') notify('Hunting phase begins!', 'red');
            }

            // Eliminations
            if (newRoom.phase === 'hunting') {
              for (const p of playersArr) {
                const prevP = (prev.players || []).find(pp => pp.id === p.id);
                if (prevP && prevP.alive !== false && p.alive === false) {
                  if (p.id === player.id) notify('You were eliminated!', 'red');
                  else notify(`${p.name} was eliminated!`, 'amber');
                }
              }
            }
          }

          lastRoomRef.current = newRoom;
          setRoom(newRoom);
          setPhase(newRoom.phase || 'lobby');
          setWinner(newRoom.winner || null);
        });

        // Chat subscription
        ref.child('chat').limitToLast(100).on('value', snap => {
          const data = snap.val() || {};
          const msgs = Object.values(data).sort((a, b) => (a.ts || 0) - (b.ts || 0));
          setChatMsgs(msgs);
        });

        // Remove player from room if they disconnect unexpectedly
        if (uidRef.current) {
          ref.child(`players/${uidRef.current}`).onDisconnect().remove();
        }
      }

      function unsubscribeFromRoom() {
        if (roomRef.current) {
          roomRef.current.off();
          roomRef.current.child('chat').off();
          if (uidRef.current) roomRef.current.child(`players/${uidRef.current}`).onDisconnect().cancel();
          roomRef.current = null;
        }
        roomCodeRef.current = null;
        lastRoomRef.current = null;
      }

      function leaveRoomCleanup() {
        unsubscribeFromRoom();
        setRoom(null);
        setPhase('lobby');
        setWinner(null);
        setChatMsgs([]);
        handledEndRef.current = false;
      }

      // ── Queue subscription / matchmaking ────────────────────────────────────
      useEffect(() => {
        if (phase !== 'queue' || !player.id) return;

        const qRef = db.ref('queue');
        queueRef.current = qRef;

        const cb = qRef.on('value', snap => {
          const data = snap.val() || {};
          const entries = Object.entries(data)
            .map(([id, v]) => ({ id, ts: v.ts }))
            .sort((a, b) => a.ts - b.ts);

          const myIndex = entries.findIndex(e => e.id === player.id);
          if (myIndex === -1) return; // we've left the queue
          setQueuePos(myIndex + 1);
          setQueueCount(entries.length);

          // Only start once the lobby is completely full. Any queued
          // player can attempt to form the match. The transaction-based
          // lock on entries[0] in tryMakeMatch ensures only one attempt
          // actually commits, so this is safe even if multiple clients
          // race. Crucially, this also means a live player can
          // claim/evict a stale ("ghost") entries[0] left behind by a
          // disconnected client, instead of deadlocking forever waiting
          // for that ghost to act as matchmaker.
          if (entries.length >= TARGET_PLAYERS) {
            tryMakeMatch(entries);
          }
        });

        return () => {
          db.ref('queue').off('value', cb);
        };
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [phase, player.id]);

      async function tryMakeMatch(entries) {
        // Take up to TARGET_PLAYERS earliest players (including self) and form a match.
        const group = entries.slice(0, Math.min(TARGET_PLAYERS, entries.length));
        const ids = group.map(e => e.id);

        // Use a transaction that aborts (returns undefined) if this slot was
        // already claimed/removed by another matchmaker — only a successful
        // claim (existing value -> null) counts as "committed".
        const lockRef = db.ref(`queue/${ids[0]}`);
        const lockResult = await lockRef.transaction(v => (v ? null : undefined));
        if (!lockResult.committed) {
          // someone else already claimed/removed this slot
          return;
        }
        // We own the role of matchmaker. Remove the rest of the group from queue.
        const restRemovals = {};
        ids.slice(1).forEach(id => { restRemovals[`queue/${id}`] = null; });
        if (Object.keys(restRemovals).length) {
          await db.ref().update(restRemovals);
        }

        // Fetch player profiles for role assignment + display
        const profiles = await Promise.all(ids.map(async id => {
          const s = await db.ref(`players/${id}`).get();
          const d = s.val() || {};
          return { id, name: d.name || 'Agent', level: d.level || 1 };
        }));

        // Assign roles: ~1/4 hunters (min 1), rest hiders
        const shuffled = [...profiles].sort(() => Math.random() - 0.5);
        const hunterCount = Math.max(1, Math.floor(shuffled.length / 4));
        const roomPlayers = {};
        let hunterIdx = 0, hiderIdx = 0;
        shuffled.forEach((p, i) => {
          const role = i < hunterCount ? 'hunter' : 'hider';
          const spawn = role === 'hunter' ? spawnFor('hunter', hunterIdx++) : spawnFor('hider', hiderIdx++);
          roomPlayers[p.id] = {
            id: p.id, name: p.name, level: p.level,
            role, alive: true,
            x: spawn.x, y: spawn.y,
            joinedAt: Date.now() + i, // preserve a stable order
          };
        });

        const code = genRoomCode();
        const roomData = {
          code, hostId: ids[0],
          map: MAPS[Math.floor(Math.random() * MAPS.length)],
          maxPlayers: shuffled.length,
          timeLimit: 180,
          phase: 'hiding',
          hideEndsAt: Date.now() + HIDE_SECONDS * 1000,
          createdAt: firebase.database.ServerValue.TIMESTAMP,
          players: roomPlayers,
          matched: true,
        };

        await db.ref(`rooms/${code}`).set(roomData);

        // Point each matched player at the new room via a per-player pointer
        const pointerUpdates = {};
        ids.forEach(id => { pointerUpdates[`matchPointers/${id}`] = code; });
        await db.ref().update(pointerUpdates);
      }

      // Watch for a match pointer being set for us while in queue
      useEffect(() => {
        if (phase !== 'queue' || !player.id) return;
        const ptrRef = db.ref(`matchPointers/${player.id}`);
        const cb = ptrRef.on('value', async snap => {
          const code = snap.val();
          if (!code) return;
          await ptrRef.remove();
          // Our queue entry was already removed by the matchmaker; cancel
          // the onDisconnect so it doesn't linger and affect a future
          // queue entry under the same player id.
          await db.ref(`queue/${player.id}`).onDisconnect().cancel();
          subscribeToRoom(code);
          notify('Match found! Game starting...', 'cyan');
        });
        return () => ptrRef.off('value', cb);
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [phase, player.id]);

      // ── Actions ─────────────────────────────────────────────────────────────
      const joinQueue = async () => {
        if (!player.id) return;
        const myQueueRef = db.ref(`queue/${player.id}`);
        await myQueueRef.set({ ts: firebase.database.ServerValue.TIMESTAMP });
        // Auto-remove our queue entry if we disconnect without leaving
        // properly, so we never become a "ghost" entry that blocks
        // matchmaking forever.
        myQueueRef.onDisconnect().remove();
        setPhase('queue');
        setQueuePos(1);
      };

      const leaveQueue = async () => {
        if (!player.id) return;
        await db.ref(`queue/${player.id}`).onDisconnect().cancel();
        await db.ref(`queue/${player.id}`).remove();
        await db.ref(`matchPointers/${player.id}`).remove();
        setPhase('lobby');
        setQueuePos(0);
        setQueueCount(0);
      };

      const createRoom = async () => {
        if (!player.id) return;
        const code = genRoomCode();
        const roomData = {
          code, hostId: player.id,
          map: roomSettings.map,
          maxPlayers: roomSettings.maxPlayers,
          timeLimit: roomSettings.timeLimit,
          phase: 'lobby',
          createdAt: firebase.database.ServerValue.TIMESTAMP,
          players: {
            [player.id]: {
              id: player.id, name: player.name, level: player.level,
              role: null, alive: true, joinedAt: Date.now(),
            }
          },
        };
        await db.ref(`rooms/${code}`).set(roomData);
        subscribeToRoom(code);
        notify(`Room created: ${code}`, 'amber');
      };

      const joinRoom = async () => {
        if (roomCodeInput.length !== 6 || !player.id) return;
        const code = roomCodeInput;
        const ref = db.ref(`rooms/${code}`);
        const snap = await ref.get();
        if (!snap.exists()) {
          notify('Room not found', 'red');
          return;
        }
        const data = snap.val();
        if (data.phase !== 'lobby') {
          notify('Match already in progress', 'red');
          return;
        }
        const players = data.players || {};
        if (Object.keys(players).length >= (data.maxPlayers || 8)) {
          notify('Room is full', 'red');
          return;
        }
        await ref.child(`players/${player.id}`).set({
          id: player.id, name: player.name, level: player.level,
          role: null, alive: true, joinedAt: Date.now(),
        });
        subscribeToRoom(code);
        notify(`Joined room ${code}`, 'cyan');
      };

      const leaveRoom = async () => {
        const code = roomCodeRef.current;
        if (code && player.id) {
          const ref = db.ref(`rooms/${code}`);
          const snap = await ref.get();
          const data = snap.val();
          if (data) {
            const players = data.players || {};
            delete players[player.id];
            if (Object.keys(players).length === 0) {
              await ref.remove();
            } else {
              const updates = { [`players/${player.id}`]: null };
              // Reassign host if the host left
              if (data.hostId === player.id) {
                const nextHost = Object.values(players).sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0))[0];
                if (nextHost) updates['hostId'] = nextHost.id;
              }
              await ref.update(updates);
            }
          }
        }
        leaveRoomCleanup();
      };

      const startGame = async () => {
        const code = roomCodeRef.current;
        if (!code || !room) return;
        const playersArr = room.players;
        if (playersArr.length < 2) return;

        // Assign roles: ~1/4 hunters (min 1), rest hiders
        const shuffled = [...playersArr].sort(() => Math.random() - 0.5);
        const hunterCount = Math.max(1, Math.floor(shuffled.length / 4));
        const updates = {};
        let hunterIdx = 0, hiderIdx = 0;
        shuffled.forEach((p, i) => {
          const role = i < hunterCount ? 'hunter' : 'hider';
          const spawn = role === 'hunter' ? spawnFor('hunter', hunterIdx++) : spawnFor('hider', hiderIdx++);
          updates[`players/${p.id}/role`] = role;
          updates[`players/${p.id}/alive`] = true;
          updates[`players/${p.id}/x`] = spawn.x;
          updates[`players/${p.id}/y`] = spawn.y;
        });
        updates['phase'] = 'hiding';
        updates['hideEndsAt'] = Date.now() + HIDE_SECONDS * 1000;

        await db.ref(`rooms/${code}`).update(updates);
      };

      const sendChat = () => {
        if (!chatInput.trim() || !player.id) return;
        const code = roomCodeRef.current;
        if (!code) return;
        db.ref(`rooms/${code}/chat`).push({
          from: player.name, text: chatInput.trim(), ts: Date.now(),
        });
        setChatInput('');
      };

      const eliminate = useCallback((targetId) => {
        const code = roomCodeRef.current;
        if (!code) return;
        db.ref(`rooms/${code}/players/${targetId}/alive`).set(false);
      }, []);

      // ── Position sync (throttled) ────────────────────────────────────────────
      const lastPosSentRef = useRef(0);
      const updatePosition = useCallback((x, y) => {
        const code = roomCodeRef.current;
        if (!code || !player.id) return;
        const now = Date.now();
        if (now - lastPosSentRef.current < 80) return; // throttle to ~12/sec
        lastPosSentRef.current = now;
        db.ref(`rooms/${code}/players/${player.id}`).update({ x, y });
      }, [player.id]);

      // ── Disguise sync ─────────────────────────────────────────────────────────
      const setDisguise = useCallback((propType) => {
        const code = roomCodeRef.current;
        if (!code || !player.id) return;
        db.ref(`rooms/${code}/players/${player.id}/disguise`).set(propType || null);
      }, [player.id]);

      const myRole = room?.players.find(p => p.id === player.id)?.role;
      const myAlive = room?.players.find(p => p.id === player.id)?.alive !== false;
      const xpPct = Math.round((player.xp / player.xpToNext) * 100);

                        <div className="h-64 bg-black/40 border border-white/10 p-6 flex flex-col justify-between">

                          </div>
                          <div className="font-['JetBrains_Mono'] text-xs text-gray-500 border-t border-white/10 pt-4">

                        </div>
                      </div>

                </div>

              {/* ══ PRIVATE OPERATION TAB ══ */}
              {activeTab === 'custom' && (

    function RoomLobby({ room, player, startGame, leaveRoom, chatMessages, chatInput, setChatInput, sendChat, chatRef }) {

      return (
        <div className="space-y-6 animate-in">
