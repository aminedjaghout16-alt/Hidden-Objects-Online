<body>
  <div id="root"></div>

  <!-- Firebase (compat SDK — works with Babel standalone, no bundler needed) -->
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── Firebase setup ─────────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyBaO0G1A-GN-uIRbSBTuBOIID11anNYL5o",
      authDomain: "prop-hunt-protocol.firebaseapp.com",
      databaseURL: "https://prop-hunt-protocol-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "prop-hunt-protocol",
      storageBucket: "prop-hunt-protocol.firebasestorage.app",
      messagingSenderId: "599873832331",
      appId: "1:599873832331:web:2529e8fee1c1353e285b8e"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.database();

    const LEVEL_XP = 1000; // xp needed per level (flat, simple curve)
    const HIDE_SECONDS = 30;

    // Matchmaking: just like PUBG/Free Fire battle royale queues, a match
    // only starts once the lobby is completely full. Players queue and
    // wait — however long that takes — until TARGET_PLAYERS is reached.
    const TARGET_PLAYERS = 10;

    function genRoomCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
      return code;
    }

    function randomName() {
      return 'Agent-' + Math.floor(1000 + Math.random() * 9000);
    }

    const MAPS = ['Office Complex', 'Warehouse', 'Library', 'Shopping Mall'];

    // ─── Main App ───────────────────────────────────────────────────────────────
    function PropHuntLobby() {
      const [activeTab, setActiveTab]   = useState('play');
      const [conn, setConn]             = useState('connecting'); // connecting | online | offline
      const [player, setPlayer]         = useState({
        id: null, name: 'Connecting...', level: 1,
        xp: 0, xpToNext: LEVEL_XP, wins: 0, losses: 0,
      });
      const [room, setRoom]             = useState(null);
      const [phase, setPhase]           = useState('lobby'); // lobby|queue|hiding|hunting|ended
      const [winner, setWinner]         = useState(null);
      const [queuePos, setQueuePos]     = useState(0);
      const [queueCount, setQueueCount] = useState(0);
      const [notification, setNotif]    = useState(null);
      const [chatMessages, setChatMsgs] = useState([]);
      const [chatInput, setChatInput]   = useState('');
      const [roomCodeInput, setRoomCodeInput] = useState('');
      const [xpPopup, setXpPopup]       = useState(null);
      const [roomSettings, setRoomSettings] = useState({
        map: 'Office Complex', timeLimit: 180, maxPlayers: 8
      });
      const [countdown, setCountdown]   = useState(null);

      const uidRef        = useRef(null);
      const roomCodeRef   = useRef(null);
      const chatRef       = useRef(null);
      const roomRef       = useRef(null);   // current room DB ref (for listeners/cleanup)
      const queueRef      = useRef(null);   // queue DB ref
      const handledEndRef = useRef(false);  // guards GAME_ENDED stats write
      const lastRoomRef   = useRef(null);   // last room snapshot for diffing join/leave

      // ── Notification helper ─────────────────────────────────────────────────
      const notify = useCallback((msg, color = 'amber') => {
        setNotif({ msg, color });
        setTimeout(() => setNotif(null), 3500);
      }, []);

      // ── Auth + player profile ────────────────────────────────────────────────
      useEffect(() => {
        const unsub = auth.onAuthStateChanged(user => {
          if (user) {
            uidRef.current = user.uid;
            initPlayer(user.uid);
          }
        });

        auth.signInAnonymously().catch(err => {
          console.error('Auth error:', err);
          setConn('offline');
          notify(`Auth failed: ${err.code || err.message || 'unknown error'}`, 'red');
        });

        return () => unsub();
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);

      async function initPlayer(uid) {
        const ref = db.ref(`players/${uid}`);
        const snap = await ref.get();
        let data;
        if (!snap.exists()) {
          data = {
            name: randomName(), level: 1, xp: 0,
            wins: 0, losses: 0, createdAt: firebase.database.ServerValue.TIMESTAMP,
          };
          await ref.set(data);
        } else {
          data = snap.val();
        }

        setPlayer(p => ({
          ...p, id: uid,
          name: data.name || randomName(),
          level: data.level || 1,
          xp: data.xp || 0,
          xpToNext: (data.level || 1) * LEVEL_XP,
          wins: data.wins || 0,
          losses: data.losses || 0,
        }));
        setConn('online');

        // Live-sync player profile (in case stats change e.g. from another tab)
        ref.on('value', s => {
          const d = s.val();
          if (!d) return;
          setPlayer(p => ({
            ...p,
            name: d.name || p.name,
            level: d.level || 1,
            xp: d.xp || 0,
            xpToNext: (d.level || 1) * LEVEL_XP,
            wins: d.wins || 0,
            losses: d.losses || 0,
          }));
        });
      }

      // ── Connection state monitoring ─────────────────────────────────────────
      useEffect(() => {
        const connectedRef = db.ref('.info/connected');
        const cb = (snap) => {
          if (snap.val() === true) {
            setConn('online');
          } else {
            setConn('offline');
          }
        };
        connectedRef.on('value', cb);
        return () => connectedRef.off('value', cb);
      }, []);

      // Auto-scroll chat
      useEffect(() => {
        if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
      }, [chatMessages]);

      // Countdown timer for hiding phase
      useEffect(() => {
        if (phase === 'hiding' && room?.hideEndsAt) {
          const tick = () => {
            const remaining = Math.ceil((room.hideEndsAt - Date.now()) / 1000);
            setCountdown(Math.max(0, remaining));
          };
          tick();
          const iv = setInterval(tick, 1000);
          return () => clearInterval(iv);
        } else if (phase !== 'hiding') {
          setCountdown(null);
        }
      }, [phase, room?.hideEndsAt]);

      // ── Host-side phase transition watchers ─────────────────────────────────
      // Hiding → Hunting, once the timer expires (any client can do this safely
      // via transaction, but we let only the host attempt it to avoid spam).
      useEffect(() => {
        if (!room || phase !== 'hiding' || !room.hideEndsAt) return;
        const isHost = room.hostId === player.id;
        if (!isHost) return;

        const remaining = room.hideEndsAt - Date.now();
        if (remaining <= 0) {
          transitionToHunting();
          return;
        }
        const t = setTimeout(transitionToHunting, remaining + 50);
        return () => clearTimeout(t);
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [room?.hideEndsAt, phase, room?.hostId, player.id]);

      async function transitionToHunting() {
        const code = roomCodeRef.current;
        if (!code) return;
        const ref = db.ref(`rooms/${code}`);
        await ref.transaction(r => {
          if (!r) return r;
          if (r.phase !== 'hiding') return r; // already transitioned
          r.phase = 'hunting';
          r.huntEndsAt = Date.now() + (r.timeLimit || 180) * 1000;
          return r;
        });
      }

      // Hunting → Ended, when timer expires (hiders win) — host-driven.
      useEffect(() => {
        if (!room || phase !== 'hunting' || !room.huntEndsAt) return;
        const isHost = room.hostId === player.id;
        if (!isHost) return;

        const remaining = room.huntEndsAt - Date.now();
        if (remaining <= 0) {
          endGame('hiders');
          return;
        }
        const t = setTimeout(() => endGame('hiders'), remaining + 50);
        return () => clearTimeout(t);
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [room?.huntEndsAt, phase, room?.hostId, player.id]);

      // Check win condition whenever players change (all hiders eliminated → hunters win)
      useEffect(() => {
        if (!room || phase !== 'hunting') return;
        const isHost = room.hostId === player.id;
        if (!isHost) return;

        const playersArr = room.players || [];
        const hiders = playersArr.filter(p => p.role === 'hider');
        if (hiders.length > 0 && hiders.every(p => p.alive === false)) {
          endGame('hunters');
        }
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [room?.players, phase, room?.hostId, player.id]);

      async function endGame(winnerSide) {
        const code = roomCodeRef.current;
        if (!code) return;
        const ref = db.ref(`rooms/${code}`);
        await ref.transaction(r => {
          if (!r) return r;
          if (r.phase === 'ended') return r;
          r.phase = 'ended';
          r.winner = winnerSide;
          return r;
        });
      }

      // ── Award XP / stats once game ends (each client updates own record) ────
      useEffect(() => {
        if (phase !== 'ended' || !room || handledEndRef.current) return;
        handledEndRef.current = true;

        const me = (room.players || []).find(p => p.id === player.id);
        if (!me) return;
        const won = (room.winner === 'hunters' && me.role === 'hunter')
                 || (room.winner === 'hiders'  && me.role === 'hider');

        const xpGained = won ? 250 : 75;

        const ref = db.ref(`players/${player.id}`);
        ref.transaction(p => {
          if (!p) p = { name: player.name, level: 1, xp: 0, wins: 0, losses: 0 };
          p.xp = (p.xp || 0) + xpGained;
          p.level = p.level || 1;
          while (p.xp >= p.level * LEVEL_XP) {
            p.xp -= p.level * LEVEL_XP;
            p.level += 1;
          }
          if (won) p.wins = (p.wins || 0) + 1;
          else p.losses = (p.losses || 0) + 1;
          return p;
        });

        setXpPopup({ xpGained, won });
        setTimeout(() => setXpPopup(null), 4000);
      }, [phase, room, player.id, player.name]);

      // Reset the "handled end" guard whenever we leave the ended phase / room
      useEffect(() => {
        if (phase !== 'ended') handledEndRef.current = false;
      }, [phase]);

      // ── Room subscription ───────────────────────────────────────────────────
      function subscribeToRoom(code) {
        unsubscribeFromRoom();
        roomCodeRef.current = code;
        const ref = db.ref(`rooms/${code}`);
        roomRef.current = ref;

        ref.on('value', snap => {
          const data = snap.val();
          if (!data) {
            // room was deleted (e.g. host left / emptied)
            notify('Room closed', 'red');
            leaveRoomCleanup();
            return;
          }

          const players = data.players || {};
          const playersArr = Object.values(players).sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0));
          const newRoom = { ...data, code, players: playersArr };

          // Detect join/leave/phase changes for notifications
          const prev = lastRoomRef.current;
          if (prev) {
            const prevIds = new Set((prev.players || []).map(p => p.id));
            const newIds  = new Set(playersArr.map(p => p.id));

            for (const p of playersArr) {
              if (!prevIds.has(p.id) && p.id !== player.id) {
                notify(`${p.name} joined`, 'cyan');
              }
            }
            for (const p of (prev.players || [])) {
              if (!newIds.has(p.id) && p.id !== player.id) {
                notify('A player left the room', 'red');
              }
            }

            if (prev.phase !== newRoom.phase) {
              if (newRoom.phase === 'hiding') notify('Game started! HIDE NOW!', 'amber');
              if (newRoom.phase === 'hunting') notify('Hunting phase begins!', 'red');
            }

            // Eliminations
            if (newRoom.phase === 'hunting') {
              for (const p of playersArr) {
                const prevP = (prev.players || []).find(pp => pp.id === p.id);
                if (prevP && prevP.alive !== false && p.alive === false) {
                  if (p.id === player.id) notify('You were eliminated!', 'red');
                  else notify(`${p.name} was eliminated!`, 'amber');
                }
              }
            }
          }

          lastRoomRef.current = newRoom;
          setRoom(newRoom);
          setPhase(newRoom.phase || 'lobby');
          setWinner(newRoom.winner || null);
        });

        // Chat subscription
        ref.child('chat').limitToLast(100).on('value', snap => {
          const data = snap.val() || {};
          const msgs = Object.values(data).sort((a, b) => (a.ts || 0) - (b.ts || 0));
          setChatMsgs(msgs);
        });

        // Remove player from room if they disconnect unexpectedly
        if (uidRef.current) {
          ref.child(`players/${uidRef.current}`).onDisconnect().remove();
        }
      }

      function unsubscribeFromRoom() {
        if (roomRef.current) {
          roomRef.current.off();
          roomRef.current.child('chat').off();
          if (uidRef.current) roomRef.current.child(`players/${uidRef.current}`).onDisconnect().cancel();
          roomRef.current = null;
        }
        roomCodeRef.current = null;
        lastRoomRef.current = null;
      }

      function leaveRoomCleanup() {
        unsubscribeFromRoom();
        setRoom(null);
        setPhase('lobby');
        setWinner(null);
        setChatMsgs([]);
        handledEndRef.current = false;
      }

      // ── Queue subscription / matchmaking ────────────────────────────────────
      useEffect(() => {
        if (phase !== 'queue' || !player.id) return;

        const qRef = db.ref('queue');
        queueRef.current = qRef;

        const cb = qRef.on('value', snap => {
          const data = snap.val() || {};
          const entries = Object.entries(data)
            .map(([id, v]) => ({ id, ts: v.ts }))
            .sort((a, b) => a.ts - b.ts);

          const myIndex = entries.findIndex(e => e.id === player.id);
          if (myIndex === -1) return; // we've left the queue
          setQueuePos(myIndex + 1);
          setQueueCount(entries.length);

          // Only start once the lobby is completely full. Any queued
          // player can attempt to form the match. The transaction-based
          // lock on entries[0] in tryMakeMatch ensures only one attempt
          // actually commits, so this is safe even if multiple clients
          // race. Crucially, this also means a live player can
          // claim/evict a stale ("ghost") entries[0] left behind by a
          // disconnected client, instead of deadlocking forever waiting
          // for that ghost to act as matchmaker.
          if (entries.length >= TARGET_PLAYERS) {
            tryMakeMatch(entries);
          }
        });

        return () => {
          db.ref('queue').off('value', cb);
        };
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [phase, player.id]);

      async function tryMakeMatch(entries) {
        // Take up to TARGET_PLAYERS earliest players (including self) and form a match.
        const group = entries.slice(0, Math.min(TARGET_PLAYERS, entries.length));
        const ids = group.map(e => e.id);

        // Use a transaction that aborts (returns undefined) if this slot was
        // already claimed/removed by another matchmaker — only a successful
        // claim (existing value -> null) counts as "committed".
        const lockRef = db.ref(`queue/${ids[0]}`);
        const lockResult = await lockRef.transaction(v => (v ? null : undefined));
        if (!lockResult.committed) {
          // someone else already claimed/removed this slot
          return;
        }
        // We own the role of matchmaker. Remove the rest of the group from queue.
        const restRemovals = {};
        ids.slice(1).forEach(id => { restRemovals[`queue/${id}`] = null; });
        if (Object.keys(restRemovals).length) {
          await db.ref().update(restRemovals);
        }

        // Fetch player profiles for role assignment + display
        const profiles = await Promise.all(ids.map(async id => {
          const s = await db.ref(`players/${id}`).get();
          const d = s.val() || {};
          return { id, name: d.name || 'Agent', level: d.level || 1 };
        }));

        // Assign roles: ~1/4 hunters (min 1), rest hiders
        const shuffled = [...profiles].sort(() => Math.random() - 0.5);
        const hunterCount = Math.max(1, Math.floor(shuffled.length / 4));
        const roomPlayers = {};
        shuffled.forEach((p, i) => {
          roomPlayers[p.id] = {
            id: p.id, name: p.name, level: p.level,
            role: i < hunterCount ? 'hunter' : 'hider',
            alive: true,
            joinedAt: Date.now() + i, // preserve a stable order
          };
        });

        const code = genRoomCode();
        const roomData = {
          code, hostId: ids[0],
          map: MAPS[Math.floor(Math.random() * MAPS.length)],
          maxPlayers: shuffled.length,
          timeLimit: 180,
          phase: 'hiding',
          hideEndsAt: Date.now() + HIDE_SECONDS * 1000,
          createdAt: firebase.database.ServerValue.TIMESTAMP,
          players: roomPlayers,
          matched: true,
        };

        await db.ref(`rooms/${code}`).set(roomData);

        // Point each matched player at the new room via a per-player pointer
        const pointerUpdates = {};
        ids.forEach(id => { pointerUpdates[`matchPointers/${id}`] = code; });
        await db.ref().update(pointerUpdates);
      }

      // Watch for a match pointer being set for us while in queue
      useEffect(() => {
        if (phase !== 'queue' || !player.id) return;
        const ptrRef = db.ref(`matchPointers/${player.id}`);
        const cb = ptrRef.on('value', async snap => {
          const code = snap.val();
          if (!code) return;
          await ptrRef.remove();
          // Our queue entry was already removed by the matchmaker; cancel
          // the onDisconnect so it doesn't linger and affect a future
          // queue entry under the same player id.
          await db.ref(`queue/${player.id}`).onDisconnect().cancel();
          subscribeToRoom(code);
          notify('Match found! Game starting...', 'cyan');
        });
        return () => ptrRef.off('value', cb);
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [phase, player.id]);

      // ── Actions ─────────────────────────────────────────────────────────────
      const joinQueue = async () => {
        if (!player.id) return;
        const myQueueRef = db.ref(`queue/${player.id}`);
        await myQueueRef.set({ ts: firebase.database.ServerValue.TIMESTAMP });
        // Auto-remove our queue entry if we disconnect without leaving
        // properly, so we never become a "ghost" entry that blocks
        // matchmaking forever.
        myQueueRef.onDisconnect().remove();
        setPhase('queue');
        setQueuePos(1);
      };

      const leaveQueue = async () => {
        if (!player.id) return;
        await db.ref(`queue/${player.id}`).onDisconnect().cancel();
        await db.ref(`queue/${player.id}`).remove();
        await db.ref(`matchPointers/${player.id}`).remove();
        setPhase('lobby');
        setQueuePos(0);
        setQueueCount(0);
      };

      const createRoom = async () => {
        if (!player.id) return;
        const code = genRoomCode();
        const roomData = {
          code, hostId: player.id,
          map: roomSettings.map,
          maxPlayers: roomSettings.maxPlayers,
          timeLimit: roomSettings.timeLimit,
          phase: 'lobby',
          createdAt: firebase.database.ServerValue.TIMESTAMP,
          players: {
            [player.id]: {
              id: player.id, name: player.name, level: player.level,
              role: null, alive: true, joinedAt: Date.now(),
            }
          },
        };
        await db.ref(`rooms/${code}`).set(roomData);
        subscribeToRoom(code);
        notify(`Room created: ${code}`, 'amber');
      };

      const joinRoom = async () => {
        if (roomCodeInput.length !== 6 || !player.id) return;
        const code = roomCodeInput;
        const ref = db.ref(`rooms/${code}`);
        const snap = await ref.get();
        if (!snap.exists()) {
          notify('Room not found', 'red');
          return;
        }
        const data = snap.val();
        if (data.phase !== 'lobby') {
          notify('Match already in progress', 'red');
          return;
        }
        const players = data.players || {};
        if (Object.keys(players).length >= (data.maxPlayers || 8)) {
          notify('Room is full', 'red');
          return;
        }
        await ref.child(`players/${player.id}`).set({
          id: player.id, name: player.name, level: player.level,
          role: null, alive: true, joinedAt: Date.now(),
        });
        subscribeToRoom(code);
        notify(`Joined room ${code}`, 'cyan');
      };

      const leaveRoom = async () => {
        const code = roomCodeRef.current;
        if (code && player.id) {
          const ref = db.ref(`rooms/${code}`);
          const snap = await ref.get();
          const data = snap.val();
          if (data) {
            const players = data.players || {};
            delete players[player.id];
            if (Object.keys(players).length === 0) {
              await ref.remove();
            } else {
              const updates = { [`players/${player.id}`]: null };
              // Reassign host if the host left
              if (data.hostId === player.id) {
                const nextHost = Object.values(players).sort((a, b) => (a.joinedAt || 0) - (b.joinedAt || 0))[0];
                if (nextHost) updates['hostId'] = nextHost.id;
              }
              await ref.update(updates);
            }
          }
        }
        leaveRoomCleanup();
      };

      const startGame = async () => {
        const code = roomCodeRef.current;
        if (!code || !room) return;
        const playersArr = room.players;
        if (playersArr.length < 2) return;

        // Assign roles: ~1/4 hunters (min 1), rest hiders
        const shuffled = [...playersArr].sort(() => Math.random() - 0.5);
        const hunterCount = Math.max(1, Math.floor(shuffled.length / 4));
        const updates = {};
        shuffled.forEach((p, i) => {
          updates[`players/${p.id}/role`] = i < hunterCount ? 'hunter' : 'hider';
          updates[`players/${p.id}/alive`] = true;
        });
        updates['phase'] = 'hiding';
        updates['hideEndsAt'] = Date.now() + HIDE_SECONDS * 1000;

        await db.ref(`rooms/${code}`).update(updates);
      };

      const sendChat = () => {
        if (!chatInput.trim() || !player.id) return;
        const code = roomCodeRef.current;
        if (!code) return;
        db.ref(`rooms/${code}/chat`).push({
          from: player.name, text: chatInput.trim(), ts: Date.now(),
        });
        setChatInput('');
      };

      const eliminate = (targetId) => {
        const code = roomCodeRef.current;
        if (!code) return;
        db.ref(`rooms/${code}/players/${targetId}/alive`).set(false);
      };

      const myRole = room?.players.find(p => p.id === player.id)?.role;
      const myAlive = room?.players.find(p => p.id === player.id)?.alive !== false;

          <div className="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,#0a0a0f_90%)] z-0" />
          <div className="pointer-events-none absolute inset-0 opacity-[0.03]" style={{ backgroundImage: 'linear-gradient(#f59e0b 1px, transparent 1px), linear-gradient(90deg, #f59e0b 1px, transparent 1px)', backgroundSize: '40px 40px' }} />

              ${notification.color === 'red'  ? 'bg-red-900/80 border-red-500/50 text-red-300' :
                notification.color === 'cyan' ? 'bg-cyan-900/80 border-cyan-500/50 text-cyan-300' :
                'bg-amber-900/80 border-amber-500/50 text-amber-300'}`}>

                      </svg>
                    </div>
                  </div>
                  <div className="flex-1 min-w-0">
                    <h2 className="font-['Chakra_Petch'] font-bold text-xl tracking-wider text-white truncate">{player.name}</h2>
                    <p className="font-['JetBrains_Mono'] text-xs text-amber-500 uppercase tracking-widest">Clearance: Alpha</p>

                <div className="space-y-1">
                  <div className="flex justify-between font-['JetBrains_Mono'] text-xs text-gray-400">
                    <span>XP</span><span>{player.xp} / {player.xpToNext}</span>
                  </div>
                  <div className="h-2 bg-white/5 rounded-sm overflow-hidden border border-white/10">
                    <div className="h-full bg-gradient-to-r from-amber-600 to-amber-400 transition-all duration-1000 ease-out shadow-[0_0_10px_rgba(245,158,11,0.5)]"
                      style={{ width: `${xpPct}%` }} />
                  </div>
                </div>
              </div>

              {/* Nav */}
              <nav className="flex-1 p-4 space-y-2">
                <NavButton active={activeTab==='play'}    onClick={() => setActiveTab('play')}
                  icon={<svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="square" strokeLinejoin="miter" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path strokeLinecap="square" strokeLinejoin="miter" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>}>
                  DEPLOY (Matchmaking)
                </NavButton>
                <NavButton active={activeTab==='custom'}  onClick={() => setActiveTab('custom')}
                  icon={<svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="square" strokeLinejoin="miter" strokeWidth={2} d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>}>
                  PRIVATE OPERATION
                </NavButton>
                <NavButton active={activeTab==='profile'} onClick={() => setActiveTab('profile')}
                  icon={<svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="square" strokeLinejoin="miter" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>}>
                  DOSSIER (Stats)
                </NavButton>
              </nav>

              {/* Connection status */}
              <div className="p-4 border-t border-white/10 font-['JetBrains_Mono'] text-xs text-gray-500 flex items-center gap-2">
                <span className="relative flex h-2 w-2">
                  <span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${conn==='online' ? 'bg-cyan-400' : conn==='offline' ? 'bg-red-400' : 'bg-yellow-400'}`}></span>
                  <span className={`relative inline-flex rounded-full h-2 w-2 ${conn==='online' ? 'bg-cyan-500' : conn==='offline' ? 'bg-red-500' : 'bg-yellow-500'}`}></span>
                </span>
                {conn==='online' ? 'SERVER: CONNECTED' : conn==='offline' ? 'SERVER: OFFLINE — RECONNECTING' : 'CONNECTING...'}
              </div>
            </aside>

            {/* ── Main area ── */}
            <main className="flex-1 overflow-y-auto p-6 md:p-12 relative">

              {/* ══ PLAY TAB ══ */}
              {activeTab === 'play' && (
                <div className="max-w-3xl mx-auto space-y-8 animate-in">
                  <div className="text-center space-y-2">
                    <h1 className="font-['Chakra_Petch'] text-5xl md:text-7xl font-bold text-white tracking-tighter uppercase">
                      Prop Hunt <span className="text-amber-500">Protocol</span>
                    </h1>
                    <p className="font-['JetBrains_Mono'] text-gray-400 text-sm md:text-base max-w-lg mx-auto">
                      Select your operational parameters. Hiders must survive until extraction. Hunters must eliminate all anomalies.
                    </p>
                  </div>

                  {/* In-game overlay */}
                  {room && (phase === 'hiding' || phase === 'hunting' || phase === 'ended') && (
                    <GameView
                      room={room} phase={phase} winner={winner} myRole={myRole}
                      myAlive={myAlive} player={player} countdown={countdown}
                      chatMessages={chatMessages} chatInput={chatInput}
                      setChatInput={setChatInput} sendChat={sendChat}
                      eliminate={eliminate} leaveRoom={leaveRoom} chatRef={chatRef}
                    />

                  {/* Room lobby */}
                  {room && phase === 'lobby' && (
                    <RoomLobby
                      room={room} player={player} myRole={myRole}
                      startGame={startGame} leaveRoom={leaveRoom}
                      chatMessages={chatMessages} chatInput={chatInput}
                      setChatInput={setChatInput} sendChat={sendChat} chatRef={chatRef}
                    />

                  {/* Matchmaking buttons */}
                  {!room && (
                    <>
                      <div className="grid md:grid-cols-2 gap-6 mt-12">
                        <button

                          className="group relative h-64 bg-white/5 border border-white/10 hover:border-amber-500/50 transition-all duration-300 overflow-hidden text-left p-6 flex flex-col justify-between disabled:opacity-50 disabled:cursor-not-allowed"

                            <div className={`w-12 h-12 rounded-sm flex items-center justify-center mb-4 text-amber-500 group-hover:scale-110 transition-transform duration-300 ${phase==='queue' ? 'bg-amber-500/30 glow-pulse' : 'bg-amber-500/20'}`}>
                              <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="square" strokeLinejoin="miter" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                            </div>
                            <h3 className="font-['Chakra_Petch'] text-2xl font-bold text-white mb-1">
                              {phase === 'queue' ? 'IN QUEUE...' : 'RAPID DEPLOYMENT'}
                            </h3>
                            <p className="font-['JetBrains_Mono'] text-xs text-gray-400">
                              {phase === 'queue' ? `Filling lobby — ${queueCount}/${TARGET_PLAYERS} players (#${queuePos})` : 'Public Matchmaking • Auto Map'}
                            </p>
                          </div>
                          <div className="relative z-10 font-['JetBrains_Mono'] text-xs text-amber-500 flex items-center gap-2 group-hover:gap-4 transition-all">
                            {phase === 'queue' ? 'ABORT SEQUENCE →' : 'INITIATE SEQUENCE →'}
                          </div>
                        </button>

                        <div className="h-64 bg-black/40 border border-white/10 p-6 flex flex-col justify-between">
                          <div>
                            <h3 className="font-['Chakra_Petch'] text-xl font-bold text-white mb-4 flex items-center gap-2">
                              <span className="w-2 h-2 bg-cyan-500 rounded-sm"></span>
                              OPERATIONAL METRICS
                            </h3>
                            <div className="grid grid-cols-2 gap-4">
                              <StatBox label="WIN RATE"      value={`${winRate}%`}               color="text-cyan-400" />
                              <StatBox label="TOTAL MATCHES" value={player.wins + player.losses}  color="text-white" />
                              <StatBox label="WINS"          value={player.wins}                  color="text-green-400" />
                              <StatBox label="LOSSES"        value={player.losses}                color="text-red-400" />
                            </div>
                          </div>
                          <div className="font-['JetBrains_Mono'] text-xs text-gray-500 border-t border-white/10 pt-4">
                            SESSION: {player.id?.slice(0,8).toUpperCase() || '--------'}
                          </div>
                        </div>
                      </div>
                    </>
                  )}
                </div>
              )}

              {/* ══ PRIVATE OPERATION TAB ══ */}
              {activeTab === 'custom' && (
                <div className="max-w-2xl mx-auto space-y-8 animate-in">
                  <div className="text-center space-y-2">
                    <h1 className="font-['Chakra_Petch'] text-4xl font-bold text-white tracking-tighter uppercase">Private Operation</h1>
                    <p className="font-['JetBrains_Mono'] text-gray-400 text-sm">Create a secure lobby or join via classified access code.</p>
                  </div>

                  {room ? (
                    <RoomLobby
                      room={room} player={player} myRole={myRole}
                      startGame={startGame} leaveRoom={leaveRoom}
                      chatMessages={chatMessages} chatInput={chatInput}
                      setChatInput={setChatInput} sendChat={sendChat} chatRef={chatRef}

                  ) : (
                    <div className="bg-white/5 border border-white/10 p-8 space-y-6">
                      <div className="grid md:grid-cols-2 gap-6">
                        <div className="space-y-2">
                          <label className="font-['JetBrains_Mono'] text-xs text-gray-400 uppercase tracking-wider">Map</label>
                          <select
                            value={roomSettings.map}
                            onChange={e => setRoomSettings(s => ({ ...s, map: e.target.value }))}
                            className="w-full bg-black/50 border border-white/10 focus:border-amber-500/50 focus:outline-none px-4 py-3 font-['JetBrains_Mono'] text-white transition-colors appearance-none"
                          >
                            <option>Office Complex</option>
                            <option>Warehouse</option>
                            <option>Library</option>
                            <option>Shopping Mall</option>
                          </select>
                        </div>
                        <div className="space-y-2">
                          <label className="font-['JetBrains_Mono'] text-xs text-gray-400 uppercase tracking-wider">Max Players</label>
                          <select
                            value={roomSettings.maxPlayers}
                            onChange={e => setRoomSettings(s => ({ ...s, maxPlayers: Number(e.target.value) }))}
                            className="w-full bg-black/50 border border-white/10 focus:border-amber-500/50 focus:outline-none px-4 py-3 font-['JetBrains_Mono'] text-white transition-colors appearance-none"
                          >
                            <option value={4}>4 Players</option>
                            <option value={8}>8 Players</option>
                            <option value={12}>12 Players</option>
                          </select>
                        </div>
                        <div className="space-y-2 md:col-span-2">
                          <label className="font-['JetBrains_Mono'] text-xs text-gray-400 uppercase tracking-wider">Hunt Timer</label>
                          <select
                            value={roomSettings.timeLimit}

                            className="w-full bg-black/50 border border-white/10 focus:border-amber-500/50 focus:outline-none px-4 py-3 font-['JetBrains_Mono'] text-white transition-colors appearance-none"
                          >
                            <option value={120}>2 Minutes</option>
                            <option value={180}>3 Minutes</option>

                        </div>
                      </div>

                      <div className="pt-4 border-t border-white/10">
                        <button

                          disabled={conn !== 'online'}
                          className="w-full py-4 bg-amber-600 hover:bg-amber-500 disabled:opacity-50 disabled:cursor-not-allowed text-black font-['Chakra_Petch'] font-bold text-lg uppercase tracking-wider transition-colors shadow-[0_0_20px_rgba(245,158,11,0.3)]"

                      </div>

                      <div className="relative flex items-center py-2">
                        <div className="flex-grow border-t border-white/10"></div>

                        <button
                          onClick={joinRoom}
                          disabled={roomCodeInput.length !== 6 || conn !== 'online'}
                          className="px-8 py-3 bg-white/5 hover:bg-white/10 disabled:opacity-50 disabled:cursor-not-allowed border border-white/10 hover:border-cyan-500/50 text-cyan-400 font-['JetBrains_Mono'] text-sm uppercase tracking-wider transition-colors"
                        >
                          Connect
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* ══ DOSSIER TAB ══ */}
              {activeTab === 'profile' && (
                <div className="max-w-4xl mx-auto space-y-8 animate-in">
                  <div className="flex items-end justify-between border-b border-white/10 pb-6">
                    <div>
                      <h1 className="font-['Chakra_Petch'] text-4xl font-bold text-white tracking-tighter uppercase mb-2">Operative Dossier</h1>
                      <p className="font-['JetBrains_Mono'] text-gray-400 text-sm">Live performance data synced from the server.</p>
                    </div>
                  </div>

                  <div className="grid md:grid-cols-3 gap-6">
                    <div className="md:col-span-2 bg-white/5 border border-white/10 p-6">
                      <h3 className="font-['Chakra_Petch'] text-xl font-bold text-white mb-6 flex items-center gap-2">
                        <span className="w-2 h-2 bg-amber-500 rounded-sm"></span>
                        LIVE STATS
                      </h3>
                      <div className="grid grid-cols-2 gap-4">
                        <StatBox label="WINS"          value={player.wins}                              color="text-green-400" />
                        <StatBox label="LOSSES"        value={player.losses}                            color="text-red-400" />
                        <StatBox label="WIN RATE"      value={`${winRate}%`}                            color="text-cyan-400" />
                        <StatBox label="TOTAL MATCHES" value={player.wins + player.losses}              color="text-white" />
                        <StatBox label="LEVEL"         value={player.level}                             color="text-amber-400" />
                        <StatBox label="XP"            value={`${player.xp}/${player.xpToNext}`}       color="text-amber-400" />
                      </div>

                      <div className="mt-6 space-y-1">
                        <div className="flex justify-between font-['JetBrains_Mono'] text-xs text-gray-400 mb-1">
                          <span>LEVEL PROGRESS</span><span>{xpPct}%</span>
                        </div>
                        <div className="h-3 bg-white/5 rounded-sm overflow-hidden border border-white/10">
                          <div className="h-full bg-gradient-to-r from-amber-600 to-amber-400 transition-all duration-1000 shadow-[0_0_10px_rgba(245,158,11,0.5)]"
                            style={{ width: `${xpPct}%` }} />
                        </div>
                      </div>
                    </div>

                    <div className="space-y-6">
                      <div className="bg-white/5 border border-white/10 p-6">
                        <h3 className="font-['Chakra_Petch'] text-lg font-bold text-white mb-4">COSMETICS</h3>
                        <div className="grid grid-cols-3 gap-2">
                          {['📦','🪑','🪴','🗑️','📺','🔒'].map((icon, idx) => (
                            <div key={idx} className={`aspect-square flex items-center justify-center text-2xl border ${idx < Math.floor(player.level / 3) + 1 ? 'border-amber-500/30 bg-amber-500/10 hover:bg-amber-500/20 cursor-pointer' : 'border-white/10 bg-black/50 grayscale opacity-40'}`}>
                              {icon}
                            </div>
                          ))}
                        </div>
                        <p className="font-['JetBrains_Mono'] text-xs text-gray-500 mt-3">Unlock more by leveling up</p>
                      </div>

                      <div className="bg-gradient-to-br from-cyan-900/20 to-blue-900/20 border border-cyan-500/20 p-6">
                        <h3 className="font-['Chakra_Petch'] text-lg font-bold text-cyan-400 mb-2">SEASON 04 PASS</h3>
                        <p className="font-['JetBrains_Mono'] text-xs text-gray-400 mb-4">
                          {Math.max(0, 5 - (player.wins + player.losses))} more matches to unlock the Golden Briefcase.
                        </p>
                        <div className="h-1.5 bg-black/50 rounded-sm overflow-hidden">
                          <div className="h-full bg-cyan-500 shadow-[0_0_10px_rgba(6,182,212,0.5)] transition-all duration-500"
                            style={{ width: `${Math.min(100, ((player.wins + player.losses) / 5) * 100)}%` }} />
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </main>
          </div>
        </div>
      );
    }

    // ─── Room Lobby Component ─────────────────────────────────────────────────
    function RoomLobby({ room, player, startGame, leaveRoom, chatMessages, chatInput, setChatInput, sendChat, chatRef }) {
      const isHost = room.hostId === player.id;
      return (
        <div className="space-y-6 animate-in">
          <div className="bg-black/40 border border-amber-500/30 p-6">
            <div className="flex items-center justify-between mb-4">
              <div>
                <h2 className="font-['Chakra_Petch'] text-2xl font-bold text-white">ROOM: <span className="text-amber-500 tracking-widest">{room.code}</span></h2>
                <p className="font-['JetBrains_Mono'] text-xs text-gray-400 mt-1">{room.map} • {room.maxPlayers} max • {room.timeLimit}s hunt</p>
              </div>
              <button onClick={leaveRoom} className="px-4 py-2 border border-red-500/30 text-red-400 font-['JetBrains_Mono'] text-xs hover:bg-red-500/10 transition-colors">
                LEAVE
              </button>
            </div>

            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
              {room.players.map(p => (
                <div key={p.id} className={`p-3 border text-center ${p.id === player.id ? 'border-amber-500/50 bg-amber-500/10' : 'border-white/10 bg-white/5'}`}>
                  <div className="font-['Chakra_Petch'] font-bold text-white text-sm truncate">{p.name}</div>
                  <div className="font-['JetBrains_Mono'] text-xs text-gray-500 mt-1">Lv.{p.level}</div>
                  {p.id === room.hostId && <div className="text-amber-400 text-xs mt-1">HOST</div>}
                </div>
              ))}
              {Array.from({ length: Math.max(0, room.maxPlayers - room.players.length) }).map((_, i) => (
                <div key={i} className="p-3 border border-white/5 bg-white/2 text-center">
                  <div className="font-['JetBrains_Mono'] text-xs text-gray-600">WAITING...</div>
                </div>
              ))}
            </div>

            {isHost && (
              <button
                onClick={startGame}
                disabled={room.players.length < 2}
                className="w-full py-4 bg-amber-600 hover:bg-amber-500 disabled:opacity-40 disabled:cursor-not-allowed text-black font-['Chakra_Petch'] font-bold text-lg uppercase tracking-wider transition-colors"
              >
                {room.players.length < 2 ? 'WAITING FOR PLAYERS...' : 'START OPERATION'}
              </button>
            )}
            {!isHost && (
              <div className="text-center font-['JetBrains_Mono'] text-sm text-gray-400 py-3 border border-white/10">
                Waiting for host to start...
              </div>
            )}
          </div>

          <ChatBox messages={chatMessages} input={chatInput} setInput={setChatInput} onSend={sendChat} chatRef={chatRef} />
        </div>
      );
    }

    // ─── In-game View ─────────────────────────────────────────────────────────
    function GameView({ room, phase, winner, myRole, myAlive, player, countdown, chatMessages, chatInput, setChatInput, sendChat, eliminate, leaveRoom, chatRef }) {
      return (
        <div className="space-y-4 animate-in">
          {/* Phase banner */}
          <div className={`p-4 border text-center ${
            phase === 'ended'   ? 'border-purple-500/50 bg-purple-900/20' :
            phase === 'hiding'  ? 'border-cyan-500/50 bg-cyan-900/20' :
                                  'border-red-500/50 bg-red-900/20'}`}>
            {phase === 'hiding' && (
              <div>
                <div className="font-['Chakra_Petch'] text-2xl font-bold text-cyan-400">HIDING PHASE</div>
                <div className="font-['JetBrains_Mono'] text-4xl font-bold text-white mt-1">{countdown ?? '...'}</div>
                <div className="font-['JetBrains_Mono'] text-xs text-gray-400 mt-1">
                  {myRole === 'hider' ? 'Find a hiding spot!' : 'Wait for hunters to start...'}
                </div>
              </div>
            )}
            {phase === 'hunting' && (
              <div>
                <div className="font-['Chakra_Petch'] text-2xl font-bold text-red-400">HUNTING PHASE</div>
                <div className="font-['JetBrains_Mono'] text-xs text-gray-400 mt-1">
                  You are a <span className={myRole === 'hunter' ? 'text-red-400' : 'text-cyan-400'}>{myRole?.toUpperCase()}</span>
                  {!myAlive && <span className="text-red-500 ml-2">— ELIMINATED</span>}
                </div>
              </div>
            )}
            {phase === 'ended' && (
              <div>
                <div className={`font-['Chakra_Petch'] text-3xl font-bold ${winner === 'hunters' ? 'text-red-400' : 'text-green-400'}`}>
                  {winner === 'hunters' ? '🎯 HUNTERS WIN' : '🏃 HIDERS ESCAPE'}
                </div>
                <button onClick={leaveRoom} className="mt-3 px-6 py-2 bg-amber-600 hover:bg-amber-500 text-black font-['Chakra_Petch'] font-bold text-sm uppercase transition-colors">
                  BACK TO LOBBY
                </button>
              </div>
            )}
          </div>

          {/* Players */}
          <div className="bg-black/40 border border-white/10 p-4">
            <h3 className="font-['JetBrains_Mono'] text-xs text-gray-400 uppercase mb-3">Players</h3>
            <div className="space-y-2">
              {room.players.map(p => (
                <div key={p.id} className={`flex items-center justify-between p-2 border ${p.id === player.id ? 'border-amber-500/30' : 'border-white/5'}`}>
                  <div className="flex items-center gap-3">
                    <div className={`w-2 h-2 rounded-full ${!p.alive ? 'bg-gray-600' : p.role === 'hunter' ? 'bg-red-400' : 'bg-cyan-400'}`} />
                    <span className="font-['JetBrains_Mono'] text-sm text-white">{p.name}</span>
                    {p.id === player.id && <span className="text-xs text-gray-500">(you)</span>}
                  </div>
                  <div className="flex items-center gap-3">
                    {p.role && <span className={`font-['JetBrains_Mono'] text-xs ${p.role === 'hunter' ? 'text-red-400' : 'text-cyan-400'}`}>{p.role}</span>}
                    {!p.alive && <span className="font-['JetBrains_Mono'] text-xs text-gray-500">eliminated</span>}
                    {myRole === 'hunter' && phase === 'hunting' && p.role === 'hider' && p.alive && p.id !== player.id && (
                      <button onClick={() => eliminate(p.id)} className="px-2 py-0.5 bg-red-600 hover:bg-red-500 text-white font-['JetBrains_Mono'] text-xs transition-colors">
                        ELIMINATE
                      </button>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>

          <ChatBox messages={chatMessages} input={chatInput} setInput={setChatInput} onSend={sendChat} chatRef={chatRef} />
        </div>
      );
    }

    // ─── Chat Box ─────────────────────────────────────────────────────────────
    function ChatBox({ messages, input, setInput, onSend, chatRef }) {
      return (
        <div className="bg-black/40 border border-white/10 p-4">
          <h3 className="font-['JetBrains_Mono'] text-xs text-gray-400 uppercase mb-3">Mission Chat</h3>
          <div ref={chatRef} className="h-40 overflow-y-auto space-y-1 mb-3">
            {messages.length === 0 && (
              <p className="font-['JetBrains_Mono'] text-xs text-gray-600">No messages yet...</p>
            )}
            {messages.map((m, i) => (
              <div key={i} className="font-['JetBrains_Mono'] text-xs">
                <span className="text-amber-500">{m.from}: </span>
                <span className="text-gray-300">{m.text}</span>
              </div>
            ))}
          </div>
          <div className="flex gap-2">
            <input
              type="text" value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && onSend()}
              placeholder="Type a message..."
              className="flex-1 bg-black/50 border border-white/10 focus:border-amber-500/50 focus:outline-none px-3 py-2 font-['JetBrains_Mono'] text-xs text-white placeholder-gray-700 transition-colors"
            />
            <button onClick={onSend} className="px-4 py-2 bg-amber-600 hover:bg-amber-500 text-black font-['JetBrains_Mono'] text-xs font-bold transition-colors">
              SEND
            </button>
          </div>
        </div>
      );
    }

    // ─── Shared components ────────────────────────────────────────────────────
    function NavButton({ active, onClick, icon, children }) {
      return (
        <button onClick={onClick}
          className={`w-full flex items-center gap-3 px-4 py-3 font-['JetBrains_Mono'] text-sm uppercase tracking-wider transition-all duration-200 border-l-2 ${
            active ? 'bg-amber-500/10 border-amber-500 text-amber-500 shadow-[inset_10px_0_20px_-10px_rgba(245,158,11,0.2)]'
                   : 'border-transparent text-gray-400 hover:text-white hover:bg-white/5'}`}>
          {icon}<span>{children}</span>
        </button>
      );
    }

    function StatBox({ label, value, color }) {
      return (
        <div className="bg-black/30 border border-white/5 p-3">
          <div className="font-['JetBrains_Mono'] text-[10px] text-gray-500 uppercase tracking-wider mb-1">{label}</div>
          <div className={`font-['Chakra_Petch'] text-xl font-bold ${color}`}>{value}</div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PropHuntLobby />);
  </script>
</body>
</html>
